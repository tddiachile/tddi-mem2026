<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Presentación del equipo de trabajo — Sodexo" />
  <title>Presentación del Equipo | Sodexo</title>

  <!-- ── Tailwind CSS via CDN ─────────────────────────────────── -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'sdx-blue':   '#283897',
            'sdx-red':    '#EE0000',
            'sdx-dark':   '#2A295C',
            'sdx-sky':    '#199CDA',
            'sdx-green':  '#34A866',
            'sdx-teal':   '#228085',
            'sdx-purple': '#915FC8',
            'sdx-pink':   '#DA558C',
            'sdx-orange': '#EF661A',
            'sdx-yellow': '#FCBD4C',
            'sdx-bronze': '#B28B4E',
          },
          fontFamily: {
            body:  ['Open Sans', 'Arial', 'sans-serif'],
            title: ['Arial', 'sans-serif'],          /* Sansa Pro sustituto */
          }
        }
      }
    };
  </script>

  <!-- ── Google Fonts (Open Sans — cuerpo de texto brand) ────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />

  <!-- ── Estilos de marca Sodexo ──────────────────────────────── -->
  <link rel="stylesheet" href="css/styles.css" />

  <!-- ── React 18 + ReactDOM via CDN ─────────────────────────── -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- ── Babel Standalone (transpila JSX en el navegador) ─────── -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- ── Utilidades no-React ──────────────────────────────────── -->
  <script src="js/utils.js"></script>

  <!-- ── D3.js v7 (organigrama interactivo) ───────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
</head>

<body class="bg-white overflow-hidden" style="font-family:'Open Sans',Arial,sans-serif;color:#2A295C;">
  <div id="root"></div>

  <!-- ══════════════════════════════════════════════════════════
       Aplicación React — Presentación del Equipo Sodexo
       ══════════════════════════════════════════════════════════ -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── Paleta de colores (brand tokens) ───────────────────── */
    const C = {
      blue:   '#283897',
      red:    '#EE0000',
      dark:   '#2A295C',
      sky:    '#199CDA',
      green:  '#34A866',
      teal:   '#228085',
      purple: '#915FC8',
      pink:   '#DA558C',
      orange: '#EF661A',
      yellow: '#FCBD4C',
      bronze: '#B28B4E',
    };

    /* ── Sistema Tarjeta Sodexo ─────────────────────────────── */
    /* Bloque blanco redondeado con línea de acento roja        */
    function Card({ children, accent = 'top', className = '', style = {} }) {
      return (
        <div
          className={`sdx-card sdx-card--accent-${accent} ${className}`}
          style={style}
        >
          {children}
        </div>
      );
    }

    /* ── SEGMENTO 0 — Home ──────────────────────────────────── */
    function SegHome({ t }) {
      const th = t.home;
      return (
        <div
          style={{
            height: '100%',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            background: `linear-gradient(135deg, ${C.dark} 0%, ${C.blue} 100%)`,
            position: 'relative',
            overflow: 'hidden',
          }}
        >
          {/* Acento decorativo — círculo translúcido */}
          <div style={{
            position: 'absolute', top: '-80px', right: '-80px',
            width: 340, height: 340, borderRadius: '50%',
            background: 'rgba(255,255,255,0.05)',
          }} />
          <div style={{
            position: 'absolute', bottom: '-60px', left: '-60px',
            width: 240, height: 240, borderRadius: '50%',
            background: 'rgba(255,255,255,0.05)',
          }} />
          {/* Línea de acento roja inferior */}
          <div style={{
            position: 'absolute', bottom: 0, left: 0, right: 0,
            height: 5, background: C.red,
          }} />

          {/* Contenido centrado */}
          <div style={{ textAlign: 'center', padding: '2rem', zIndex: 1 }}>
            {/* Supra-título */}
            <p style={{
              color: 'rgba(255,255,255,0.80)',
              fontSize: 'clamp(0.85rem, 2vw, 1.1rem)',
              fontWeight: 600,
              letterSpacing: '0.18em',
              textTransform: 'uppercase',
              marginBottom: '1.2rem',
            }}>
              {th.supra}
            </p>

            {/* Título principal */}
            <h1 style={{
              color: '#ffffff',
              fontSize: 'clamp(2.2rem, 6vw, 4rem)',
              fontWeight: 700,
              fontFamily: 'Arial, sans-serif',
              lineHeight: 1.15,
              margin: '0 0 1.4rem',
            }}>
              {th.title}
            </h1>

            {/* Separador */}
            <div style={{
              width: 60, height: 4, borderRadius: 2,
              background: C.red,
              margin: '0 auto 1.4rem',
            }} />

            {/* Subtítulo */}
            <p style={{
              color: 'rgba(255,255,255,0.65)',
              fontSize: 'clamp(0.9rem, 2vw, 1.15rem)',
              fontWeight: 400,
              letterSpacing: '0.06em',
              margin: 0,
            }}>
              {th.date}
            </p>
          </div>
        </div>
      );
    }

    /* ── Renderizador del organigrama top-down (D3) ────────── */
    function renderOrgChart(container, ta) {
      /* Dimensiones de nodos */
      const NW = 158;          /* ancho de cada nodo                      */
      const NH0 = 42;          /* alto de nodos compactos (niveles 0 y 1) */
      const S_HEADER = 28;     /* alto del encabezado de área (nivel 2)   */
      const S_ITEM   = 19;     /* alto por ítem de personal               */
      const S_PAD    = 5;      /* padding interno antes/después de ítems  */
      const GAP_H    = 24;     /* gap horizontal entre nodos de nivel 2   */
      const GAP_V    = 48;     /* gap vertical entre niveles              */

      /* Staff de cada área (no forman parte de la jerarquía D3) */
      const proyStaff = [
        { name: 'PMO',              color: C.teal },
        { name: ta.solutionsArch,   color: C.teal },
        { name: ta.projectManagers, color: C.teal, count: 4 },
        { name: ta.devAnalyst,      color: C.teal },
      ];
      const infraStaff = [
        { name: ta.secCoord,    color: C.pink },
        { name: ta.infraCoord,  color: C.pink, count: 2 },
        { name: ta.supportTech, color: C.pink, count: 3 },
        { name: ta.infraMonitor,color: C.pink, count: 2 },
        { name: ta.helpDesk,    color: C.pink },
        { name: ta.itAssistant, color: C.pink },
      ];

      const nhArea = staff => S_HEADER + S_PAD + staff.length * S_ITEM + S_PAD;
      const NH_P = nhArea(proyStaff);   /* ≈ 112 px */
      const NH_I = nhArea(infraStaff);  /* ≈ 150 px */

      /* Jerarquía D3 — sólo 3 niveles; staff va en data.staff */
      const data = {
        name: 'Francisco González', role: ta.directorRole, color: C.dark, nh: NH0,
        children: [{
          name: 'Marcelo Fernández', role: 'CIO', color: C.blue, nh: NH0,
          children: [
            { name: ta.projectsArea, color: C.sky,    nh: NH_P, staff: proyStaff },
            { name: ta.infraSec, role: 'Erwin Morales', color: C.purple, nh: NH_I, staff: infraStaff },
          ],
        }],
      };

      /* Posiciones Y fijas por nivel (top-down manual) */
      const yL = [0, NH0 + GAP_V, NH0 + GAP_V + NH0 + GAP_V];

      /* D3 tree — sólo calcula la coordenada X (spread horizontal) */
      const root = d3.hierarchy(data);
      d3.tree().nodeSize([NW + GAP_H, 1])(root);
      root.each(d => { d.y = yL[d.depth]; });

      /* ViewBox justo al contenido */
      let minX = Infinity, maxX = -Infinity;
      root.each(d => {
        if (d.x < minX) minX = d.x;
        if (d.x > maxX) maxX = d.x;
      });
      const PAD = 14;
      const vbX = minX - NW / 2 - PAD;
      const vbY = -PAD;
      const vbW = (maxX - minX) + NW + PAD * 2;
      const vbH = yL[2] + Math.max(NH_P, NH_I) + PAD;

      d3.select(container).selectAll('svg').remove();

      const svg = d3.select(container)
        .append('svg')
        .attr('viewBox', `${vbX} ${vbY} ${vbW} ${vbH}`)
        .attr('preserveAspectRatio', 'xMidYMid meet')
        .style('width', '100%')
        .style('height', '100%');

      /* Defs: sombra + clipPaths para esquinas redondeadas en áreas */
      const defs = svg.append('defs');
      const flt = defs.append('filter')
        .attr('id', 'nd-shadow').attr('x','-15%').attr('y','-15%')
        .attr('width','130%').attr('height','130%');
      flt.append('feDropShadow')
        .attr('dx', 0).attr('dy', 1).attr('stdDeviation', 2.5)
        .attr('flood-color', 'rgba(0,0,0,0.16)');

      /* ── Conectores — curvas Bézier verticales ── */
      svg.append('g')
        .selectAll('path')
        .data(root.links())
        .join('path')
        .attr('fill', 'none')
        .attr('stroke', '#cbd5e1')
        .attr('stroke-width', 1.5)
        .attr('d', lk => {
          const sx = lk.source.x,  sy = lk.source.y + lk.source.data.nh;
          const tx = lk.target.x,  ty = lk.target.y;
          const my = (sy + ty) / 2;
          return `M${sx},${sy} C${sx},${my} ${tx},${my} ${tx},${ty}`;
        });

      /* ── Nodos ── */
      root.descendants().forEach((d, i) => {
        const isArea = d.depth === 2;
        const nh = d.data.nh;
        const g  = svg.append('g')
          .attr('transform', `translate(${d.x - NW / 2},${d.y})`)
          .attr('filter', 'url(#nd-shadow)');

        if (!isArea) {
          /* Nodos compactos (director, CIO) */
          g.append('rect')
            .attr('width', NW).attr('height', nh).attr('rx', 6)
            .attr('fill', d.data.color);

          g.append('text')
            .attr('x', NW / 2).attr('y', d.data.role ? nh / 2 - 6 : nh / 2)
            .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
            .attr('fill', 'white')
            .attr('font-family', "'Open Sans',Arial,sans-serif")
            .attr('font-size', '9px').attr('font-weight', '700')
            .text(d.data.name);

          if (d.data.role) {
            g.append('text')
              .attr('x', NW / 2).attr('y', nh / 2 + 7)
              .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
              .attr('fill', 'rgba(255,255,255,0.78)')
              .attr('font-family', "'Open Sans',Arial,sans-serif")
              .attr('font-size', '7.5px')
              .text(d.data.role);
          }
        } else {
          /* Nodos de área — encabezado coloreado + lista de personal en blanco */
          const clipId = `clip-area-${i}`;
          defs.append('clipPath').attr('id', clipId)
            .append('rect').attr('width', NW).attr('height', nh).attr('rx', 6);

          const gc = g.append('g').attr('clip-path', `url(#${clipId})`);

          /* Fondo blanco (esquinas redondeadas via clipPath) */
          gc.append('rect').attr('width', NW).attr('height', nh).attr('fill', 'white');

          /* Encabezado coloreado */
          gc.append('rect').attr('width', NW).attr('height', S_HEADER).attr('fill', d.data.color);

          /* Nombre del área */
          gc.append('text')
            .attr('x', NW / 2).attr('y', d.data.role ? S_HEADER / 2 - 5 : S_HEADER / 2)
            .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
            .attr('fill', 'white')
            .attr('font-family', "'Open Sans',Arial,sans-serif")
            .attr('font-size', '9px').attr('font-weight', '700')
            .text(d.data.name);

          if (d.data.role) {
            gc.append('text')
              .attr('x', NW / 2).attr('y', S_HEADER / 2 + 5)
              .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
              .attr('fill', 'rgba(255,255,255,0.82)')
              .attr('font-family', "'Open Sans',Arial,sans-serif")
              .attr('font-size', '7px')
              .text(d.data.role);
          }

          /* Línea separadora */
          gc.append('line')
            .attr('x1', 0).attr('y1', S_HEADER)
            .attr('x2', NW).attr('y2', S_HEADER)
            .attr('stroke', '#e2e8f0').attr('stroke-width', 1);

          /* Ítems de personal */
          d.data.staff.forEach((item, si) => {
            const iy = S_HEADER + S_PAD + si * S_ITEM + S_ITEM / 2;

            gc.append('circle')
              .attr('cx', 10).attr('cy', iy).attr('r', 3.5).attr('fill', item.color);

            gc.append('text')
              .attr('x', 19).attr('y', iy)
              .attr('dominant-baseline', 'middle')
              .attr('fill', '#374151')
              .attr('font-family', "'Open Sans',Arial,sans-serif")
              .attr('font-size', '8px')
              .text(item.name);

            if (item.count) {
              gc.append('circle')
                .attr('cx', NW - 10).attr('cy', iy).attr('r', 7)
                .attr('fill', C.sky).attr('stroke', 'white').attr('stroke-width', 1.5);
              gc.append('text')
                .attr('x', NW - 10).attr('y', iy + 0.5)
                .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
                .attr('fill', 'white')
                .attr('font-family', "'Open Sans',Arial,sans-serif")
                .attr('font-size', '7px').attr('font-weight', '700')
                .text(item.count);
            }
          });
        }
      });
    }

    /* ── SEGMENTO 1 — Quiénes somos ─────────────────────────── */
    function SegAbout({ t }) {
      const ta = t.about;
      const chartRef = useRef(null);

      useEffect(() => {
        if (chartRef.current) renderOrgChart(chartRef.current, ta);
      }, [t]);

      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>

          {/* Título — ancho completo */}
          <div style={{ padding: '0.85rem 1.75rem 0.6rem', flexShrink: 0 }}>
            <h2 style={{ color: C.blue, fontSize: '1.45rem', fontWeight: 700, fontFamily: 'Arial,sans-serif', margin: 0 }}>
              {ta.heading}
            </h2>
          </div>

          {/* Cuerpo — dos mitades */}
          <div style={{ flex: 1, minHeight: 0, display: 'flex' }}>

            {/* Mitad izquierda — organigrama top-down */}
            <div
              ref={chartRef}
              style={{ flex: '0 0 50%', minWidth: 0, padding: '0.25rem 1rem 0.75rem 1.5rem', overflow: 'hidden' }}
            />

            {/* Separador vertical */}
            <div style={{ width: 1, background: '#e5e7eb', flexShrink: 0, margin: '0.25rem 0 0.75rem' }} />

            {/* Mitad derecha — frase */}
            <div style={{
              flex: 1,
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              padding: '1.5rem 2.5rem',
            }}>
              <blockquote style={{ margin: 0 }}>
                <div style={{ width: 40, height: 4, borderRadius: 2, background: C.red, marginBottom: '1.25rem' }} />
                <p style={{
                  color: C.dark,
                  fontSize: 'clamp(1rem, 2vw, 1.35rem)',
                  fontWeight: 700,
                  fontFamily: 'Arial, sans-serif',
                  lineHeight: 1.55,
                  margin: 0,
                }}>
                  "{ta.quote}"
                </p>
              </blockquote>
            </div>

          </div>
        </div>
      );
    }

    /* ── Configuración de segmentos ─────────────────────────── */
    const SEGMENTS_CONFIG = [
      { id: 0, Component: SegHome  },
      { id: 1, Component: SegAbout },
    ];

    /* ════════════════════════════════════════════════════════
       Componente principal — App
       ════════════════════════════════════════════════════════ */
    function App({ locales }) {
      const [lang,       setLang]       = useState('es');
      const [displayIdx, setDisplayIdx] = useState(0);
      const [animClass,  setAnimClass]  = useState('');
      const [animating,  setAnimating]  = useState(false);
      const [menuOpen,   setMenuOpen]   = useState(true);
      const menuRef = useRef(null);

      const t        = locales[lang];
      const SEGMENTS = SEGMENTS_CONFIG.map((s, i) => ({ ...s, title: t.segments[i] }));

      /* ── Sincronizar lang con el documento ──────────────── */
      useEffect(() => {
        document.title = t.pageTitle;
        document.documentElement.lang = lang;
      }, [lang]);

      /* ── Alternar idioma ────────────────────────────────── */
      const toggleLang = () => setLang(l => l === 'es' ? 'en' : 'es');

      /* ── Navegar a una diapositiva ──────────────────────── */
      const goTo = (idx) => {
        if (idx === displayIdx || animating || idx < 0 || idx >= SEGMENTS.length) return;

        const dir = idx > displayIdx ? 'next' : 'prev';
        setAnimating(true);

        /* 1. Animar salida del slide actual */
        setAnimClass(`slide-exit-${dir}`);

        setTimeout(() => {
          /* 2. Cambiar contenido y animar entrada */
          setDisplayIdx(idx);
          setAnimClass(`slide-enter-${dir}`);

          setTimeout(() => {
            /* 3. Limpiar clases */
            setAnimClass('');
            setAnimating(false);
          }, 400);
        }, 300);
      };

      /* ── Navegación por teclado ─────────────────────────── */
      useEffect(() => {
        const onKey = (e) => {
          if (['ArrowRight', 'ArrowDown', ' '].includes(e.key)) {
            e.preventDefault();
            goTo(displayIdx + 1);
          }
          if (['ArrowLeft', 'ArrowUp'].includes(e.key)) {
            e.preventDefault();
            goTo(displayIdx - 1);
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [displayIdx, animating]);

      /* ── Cerrar menú al hacer clic fuera ────────────────── */
      useEffect(() => {
        const onMouseDown = (e) => {
          if (menuRef.current && !menuRef.current.contains(e.target)) {
            setMenuOpen(false);
          }
        };
        document.addEventListener('mousedown', onMouseDown);
        return () => document.removeEventListener('mousedown', onMouseDown);
      }, []);

      const { Component: CurrentSlide } = SEGMENTS[displayIdx];

      /* ── Render ─────────────────────────────────────────── */
      return (
        <div style={{ display: 'flex', height: '100vh', overflow: 'hidden', background: '#fff' }}>

          {/* ════ MENÚ LATERAL ══════════════════════════════ */}
          <div
            ref={menuRef}
            className="sidebar"
            style={{ width: menuOpen ? 220 : 8 }}
            aria-label={t.ariaOpenMenu}
          >
            {/* Borde rojo (menú oculto) */}
            {!menuOpen && (
              <div
                className="sidebar-collapsed-bar"
                onClick={() => setMenuOpen(true)}
                role="button"
                tabIndex={0}
                aria-label={t.ariaOpenMenu}
                onKeyDown={e => e.key === 'Enter' && setMenuOpen(true)}
              />
            )}

            {/* Contenido del menú */}
            <div
              className="sidebar-inner"
              style={{ opacity: menuOpen ? 1 : 0, pointerEvents: menuOpen ? 'auto' : 'none' }}
            >
              {/* Cabecera del menú */}
              <div style={{ borderBottom: '1px solid rgba(255,255,255,0.18)', paddingBottom: '1.1rem', marginBottom: '1.4rem' }}>
                <div style={{
                  background: 'white', borderRadius: 8, padding: '6px 10px',
                  display: 'inline-flex', alignItems: 'center',
                  borderTop: `3px solid ${C.red}`,
                  marginBottom: '0.75rem',
                }}>
                  <img
                    src="assets/logo.png"
                    alt="Sodexo"
                    style={{ height: 32, width: 'auto', display: 'block' }}
                  />
                </div>
                <div style={{ color: 'white', fontWeight: 600, fontSize: '0.82rem' }}>{t.sidebarTitle}</div>
                <div style={{ color: 'rgba(255,255,255,0.55)', fontSize: '0.72rem' }}>{t.sidebarSubtitle}</div>
              </div>

              {/* Navegación por segmentos */}
              <nav style={{ flex: 1 }}>
                {SEGMENTS.map((seg, i) => (
                  <button
                    key={seg.id}
                    onClick={() => { goTo(i); }}
                    className={`nav-btn ${displayIdx === i ? 'active' : ''}`}
                    aria-current={displayIdx === i ? 'page' : undefined}
                  >
                    <span className="nav-indicator">{i + 1}</span>
                    {seg.title}
                  </button>
                ))}
              </nav>

              {/* Cerrar menú */}
              <button
                onClick={() => setMenuOpen(false)}
                style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'rgba(255,255,255,0.45)', fontSize: '0.72rem', textAlign: 'left', padding: '0.4rem 0', marginTop: '0.75rem' }}
                aria-label={t.ariaCloseMenu}
              >
                {t.sidebarClose}
              </button>
            </div>
          </div>

          {/* ════ ÁREA PRINCIPAL ════════════════════════════ */}
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', minWidth: 0 }}>

            {/* ── Encabezado ─────────────────────────────── */}
            <header
              className="site-header"
              style={{ display: 'grid', gridTemplateColumns: '1fr auto 1fr', alignItems: 'center', gap: '1rem' }}
            >
              {/* Título — columna izquierda */}
              <h1
                className="brand-title"
                style={{ color: C.blue, fontSize: '1.15rem', fontWeight: 700, fontFamily: 'Arial,sans-serif', margin: 0 }}
              >
                {t.headerTitle}
              </h1>

              {/* Botón de idioma — columna central */}
              <button
                onClick={toggleLang}
                aria-label={lang === 'es' ? 'Switch to English' : 'Cambiar a español'}
                style={{
                  background: C.blue,
                  color: '#ffffff',
                  border: 'none',
                  borderRadius: 20,
                  padding: '4px 16px',
                  fontSize: '0.78rem',
                  fontWeight: 700,
                  letterSpacing: '0.08em',
                  cursor: 'pointer',
                  fontFamily: "'Open Sans', Arial, sans-serif",
                  transition: 'background 180ms ease',
                }}
                onMouseEnter={e => e.currentTarget.style.background = '#1e2c7a'}
                onMouseLeave={e => e.currentTarget.style.background = C.blue}
              >
                {t.langToggle}
              </button>

              {/* Contador — columna derecha */}
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, justifyContent: 'flex-end' }}>
                <span style={{ color: C.dark, fontSize: '0.82rem' }}>
                  {displayIdx + 1} / {SEGMENTS.length}
                </span>
                {/* Punto de acento rojo (identidad de marca) */}
                <div style={{ width: 10, height: 10, borderRadius: '50%', backgroundColor: C.red, flexShrink: 0 }} />
              </div>
            </header>

            {/* ── Área de diapositivas ────────────────────── */}
            <div style={{ flex: 1, position: 'relative', overflow: 'hidden' }}>
              <div
                key={`slide-${displayIdx}-${animClass}`}
                className={`slide-container ${animClass}`}
                style={{ position: 'absolute', inset: 0 }}
              >
                <CurrentSlide t={t} />
              </div>
            </div>

            {/* ── Footer de navegación ────────────────────── */}
            <footer className="slide-footer">
              <button
                onClick={() => goTo(displayIdx - 1)}
                disabled={displayIdx === 0 || animating}
                className="btn-nav btn-nav-primary"
                aria-label={t.ariaPrev}
              >
                {t.prev}
              </button>

              {/* Indicadores de posición */}
              <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                {SEGMENTS.map((_, i) => (
                  <button
                    key={i}
                    onClick={() => goTo(i)}
                    className={`slide-dot ${displayIdx === i ? 'active' : ''}`}
                    aria-label={`${t.ariaGoTo} ${i + 1}: ${SEGMENTS[i].title}`}
                    aria-current={displayIdx === i ? 'step' : undefined}
                  />
                ))}
              </div>

              <button
                onClick={() => goTo(displayIdx + 1)}
                disabled={displayIdx === SEGMENTS.length - 1 || animating}
                className="btn-nav btn-nav-primary"
                aria-label={t.ariaNext}
              >
                {t.next}
              </button>
            </footer>
          </div>
        </div>
      );
    }

    /* ── Cargar traducciones y montar la app ────────────────── */
    fetch('locales.json')
      .then(r => r.json())
      .then(locales => {
        ReactDOM.createRoot(document.getElementById('root')).render(<App locales={locales} />);
      });
  </script>
</body>
</html>
