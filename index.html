<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Presentación del equipo de trabajo — Sodexo" />
  <title>Presentación del Equipo | Sodexo</title>

  <!-- ── Tailwind CSS via CDN ─────────────────────────────────── -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'sdx-blue':   '#283897',
            'sdx-red':    '#EE0000',
            'sdx-dark':   '#2A295C',
            'sdx-sky':    '#199CDA',
            'sdx-green':  '#34A866',
            'sdx-teal':   '#228085',
            'sdx-purple': '#915FC8',
            'sdx-pink':   '#DA558C',
            'sdx-orange': '#EF661A',
            'sdx-yellow': '#FCBD4C',
            'sdx-bronze': '#B28B4E',
          },
          fontFamily: {
            body:  ['Open Sans', 'Arial', 'sans-serif'],
            title: ['Arial', 'sans-serif'],          /* Sansa Pro sustituto */
          }
        }
      }
    };
  </script>

  <!-- ── Google Fonts (Open Sans — cuerpo de texto brand) ────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />

  <!-- ── Estilos de marca Sodexo ──────────────────────────────── -->
  <link rel="stylesheet" href="css/styles.css" />

  <!-- ── React 18 + ReactDOM via CDN ─────────────────────────── -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- ── Babel Standalone (transpila JSX en el navegador) ─────── -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- ── Utilidades no-React ──────────────────────────────────── -->
  <script src="js/utils.js"></script>
</head>

<body class="bg-white overflow-hidden" style="font-family:'Open Sans',Arial,sans-serif;color:#2A295C;">
  <div id="root"></div>

  <!-- ══════════════════════════════════════════════════════════
       Aplicación React — Presentación del Equipo Sodexo
       ══════════════════════════════════════════════════════════ -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── Paleta de colores (brand tokens) ───────────────────── */
    const C = {
      blue:   '#283897',
      red:    '#EE0000',
      dark:   '#2A295C',
      sky:    '#199CDA',
      green:  '#34A866',
      teal:   '#228085',
      purple: '#915FC8',
      pink:   '#DA558C',
      orange: '#EF661A',
      yellow: '#FCBD4C',
      bronze: '#B28B4E',
    };

    /* ── Sistema Tarjeta Sodexo ─────────────────────────────── */
    /* Bloque blanco redondeado con línea de acento roja        */
    function Card({ children, accent = 'top', className = '', style = {} }) {
      return (
        <div
          className={`sdx-card sdx-card--accent-${accent} ${className}`}
          style={style}
        >
          {children}
        </div>
      );
    }

    /* ── SEGMENTO 0 — Home ──────────────────────────────────── */
    function SegHome() {
      return (
        <div
          style={{
            height: '100%',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            background: `linear-gradient(135deg, ${C.dark} 0%, ${C.blue} 100%)`,
            position: 'relative',
            overflow: 'hidden',
          }}
        >
          {/* Acento decorativo — círculo translúcido */}
          <div style={{
            position: 'absolute', top: '-80px', right: '-80px',
            width: 340, height: 340, borderRadius: '50%',
            background: 'rgba(255,255,255,0.05)',
          }} />
          <div style={{
            position: 'absolute', bottom: '-60px', left: '-60px',
            width: 240, height: 240, borderRadius: '50%',
            background: 'rgba(255,255,255,0.05)',
          }} />
          {/* Línea de acento roja inferior */}
          <div style={{
            position: 'absolute', bottom: 0, left: 0, right: 0,
            height: 5, background: C.red,
          }} />

          {/* Contenido centrado */}
          <div style={{ textAlign: 'center', padding: '2rem', zIndex: 1 }}>
            {/* Supra-título */}
            <p style={{
              color: 'rgba(255,255,255,0.80)',
              fontSize: 'clamp(0.85rem, 2vw, 1.1rem)',
              fontWeight: 600,
              letterSpacing: '0.18em',
              textTransform: 'uppercase',
              marginBottom: '1.2rem',
            }}>
              TDDI &amp; IA — Sodexo Chile
            </p>

            {/* Título principal */}
            <h1 style={{
              color: '#ffffff',
              fontSize: 'clamp(2.2rem, 6vw, 4rem)',
              fontWeight: 700,
              fontFamily: 'Arial, sans-serif',
              lineHeight: 1.15,
              margin: '0 0 1.4rem',
            }}>
              Transformación con rumbo
            </h1>

            {/* Separador */}
            <div style={{
              width: 60, height: 4, borderRadius: 2,
              background: C.red,
              margin: '0 auto 1.4rem',
            }} />

            {/* Subtítulo */}
            <p style={{
              color: 'rgba(255,255,255,0.65)',
              fontSize: 'clamp(0.9rem, 2vw, 1.15rem)',
              fontWeight: 400,
              letterSpacing: '0.06em',
              margin: 0,
            }}>
              abril 2026
            </p>
          </div>
        </div>
      );
    }

    /* ── Helpers de organigrama ─────────────────────────────── */
    /* Nodo raíz / nivel superior */
    function OrgNode({ name, role, color = C.blue, bold = false }) {
      return (
        <div style={{
          background: color,
          color: '#fff',
          borderRadius: 6,
          padding: '4px 10px',
          display: 'inline-block',
          fontSize: bold ? '0.72rem' : '0.65rem',
          fontWeight: bold ? 700 : 600,
          whiteSpace: 'nowrap',
          lineHeight: 1.35,
          textAlign: 'center',
          maxWidth: 180,
        }}>
          <div style={{ fontWeight: 700 }}>{name}</div>
          {role && <div style={{ fontWeight: 400, opacity: 0.88 }}>{role}</div>}
        </div>
      );
    }

    /* Rama con línea vertical + hijos */
    function OrgBranch({ children, indent = 12 }) {
      return (
        <div style={{ paddingLeft: indent, borderLeft: `2px solid ${C.sky}30`, marginLeft: 6, marginTop: 3 }}>
          {children}
        </div>
      );
    }

    /* Fila de un hijo con línea horizontal */
    function OrgRow({ children }) {
      return (
        <div style={{ display: 'flex', alignItems: 'center', gap: 4, marginTop: 4, position: 'relative' }}>
          <div style={{ width: 10, height: 2, background: `${C.sky}50`, flexShrink: 0 }} />
          {children}
        </div>
      );
    }

    /* Badge de cantidad de colaboradores */
    function ColBadge({ n }) {
      return (
        <span style={{
          background: C.sky, color: '#fff',
          borderRadius: 10, fontSize: '0.55rem',
          padding: '1px 5px', marginLeft: 4, fontWeight: 700,
        }}>{n}</span>
      );
    }

    /* ── SEGMENTO 1 — Quiénes somos ─────────────────────────── */
    function SegAbout() {
      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>

          {/* Cabecera */}
          <div style={{ padding: '1rem 1.75rem 0.5rem', flexShrink: 0 }}>
            <h2 style={{ color: C.blue, fontSize: '1.55rem', fontWeight: 700, fontFamily: 'Arial,sans-serif', margin: 0 }}>
              quiénes somos
            </h2>
          </div>

          {/* Cuerpo en dos columnas */}
          <div style={{ flex: 1, display: 'flex', gap: '1.5rem', padding: '0.5rem 1.75rem 1rem', overflow: 'hidden', minHeight: 0 }}>

            {/* ── Columna izquierda — Organigrama ──────────── */}
            <div style={{
              flex: '0 0 auto', width: '52%',
              overflowY: 'auto', paddingRight: 4,
            }}>
              <div style={{ fontSize: '0.67rem', color: C.dark, fontWeight: 600, marginBottom: 8, letterSpacing: '0.04em', textTransform: 'uppercase' }}>
                Estructura organizacional
              </div>

              {/* Nivel 0 — Director */}
              <div style={{ display: 'flex', justifyContent: 'flex-start' }}>
                <OrgNode name="Francisco González" role="Director Service Operation" color={C.dark} bold />
              </div>

              <OrgBranch indent={10}>
                {/* Nivel 1 — CIO */}
                <OrgRow>
                  <OrgNode name="Marcelo Fernández" role="CIO" color={C.blue} bold />
                </OrgRow>

                <OrgBranch>
                  {/* ── Sub-área Proyectos */}
                  <OrgRow>
                    <OrgNode name="Área de proyectos" color={C.sky} />
                  </OrgRow>
                  <OrgBranch indent={10}>
                    <OrgRow><OrgNode name="PMO" color={C.teal} /></OrgRow>
                    <OrgRow><OrgNode name="Arquitecto de soluciones" color={C.teal} /></OrgRow>
                    <OrgRow>
                      <OrgNode name="Jefes de proyecto" color={C.teal} />
                      <ColBadge n="4" />
                    </OrgRow>
                    <OrgRow><OrgNode name="Analista programador" color={C.teal} /></OrgRow>
                  </OrgBranch>

                  {/* ── Sub-área Infraestructura */}
                  <OrgRow>
                    <OrgNode name="Infraestructura y seguridad" role="Erwin Morales" color={C.purple} />
                  </OrgRow>
                  <OrgBranch indent={10}>
                    <OrgRow><OrgNode name="Coordinador de seguridad" color={C.pink} /></OrgRow>
                    <OrgRow>
                      <OrgNode name="Coordinador de infraestructura" color={C.pink} />
                      <ColBadge n="2" />
                    </OrgRow>
                    <OrgRow>
                      <OrgNode name="Técnico de soporte" color={C.pink} />
                      <ColBadge n="3" />
                    </OrgRow>
                    <OrgRow>
                      <OrgNode name="Monitor de infraestructura" color={C.pink} />
                      <ColBadge n="2" />
                    </OrgRow>
                    <OrgRow><OrgNode name="Analista de mesa de ayuda" color={C.pink} /></OrgRow>
                    <OrgRow><OrgNode name="Asistente IT" color={C.pink} /></OrgRow>
                  </OrgBranch>
                </OrgBranch>
              </OrgBranch>
            </div>

            {/* ── Columna derecha — Frase central ─────────── */}
            <div style={{
              flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center',
              borderLeft: `3px solid ${C.red}`,
              paddingLeft: '1.5rem',
            }}>
              <blockquote style={{ margin: 0 }}>
                <p style={{
                  color: C.dark,
                  fontSize: 'clamp(1rem, 2.2vw, 1.45rem)',
                  fontWeight: 700,
                  fontFamily: 'Arial, sans-serif',
                  lineHeight: 1.45,
                  margin: '0 0 1rem',
                }}>
                  "Somos el área que convierte la estrategia tecnológica en resultados concretos — a través de terceros, con control propio."
                </p>
                <div style={{ width: 40, height: 3, borderRadius: 2, background: C.red }} />
              </blockquote>
            </div>

          </div>
        </div>
      );
    }

    /* ── SEGMENTO 2 — Nuestro equipo ────────────────────────── */
    function SegTeam() {
      const team = [
        { name: 'Ana García',      role: 'Líder de Proyecto',    color: C.sky    },
        { name: 'Carlos López',    role: 'Desarrollador Senior',  color: C.green  },
        { name: 'María Rodríguez', role: 'Diseñadora UX/UI',      color: C.purple },
        { name: 'Juan Martínez',   role: 'Analista de Datos',     color: C.teal   },
        { name: 'Laura Sánchez',   role: 'QA Engineer',           color: C.orange },
        { name: 'Diego Herrera',   role: 'DevOps / Infraestructura', color: C.bronze },
      ];
      return (
        <div className="h-full flex flex-col items-center justify-center p-8 md:p-14 overflow-y-auto">
          <h2
            className="brand-title"
            style={{ color: C.blue, fontSize: '2rem', fontWeight: 700, fontFamily: 'Arial,sans-serif', marginBottom: '1.75rem', alignSelf: 'flex-start', maxWidth: '60rem', width: '100%', margin: '0 auto 1.75rem' }}
          >
            nuestro equipo
          </h2>
          <div className="grid grid-cols-2 md:grid-cols-3 gap-5 max-w-4xl w-full">
            {team.map((m, i) => (
              <Card key={i} accent="top" className="p-6 text-center" style={{ paddingTop: '1.25rem' }}>
                <div
                  className="team-avatar"
                  style={{ backgroundColor: m.color }}
                >
                  {getInitials(m.name)}
                </div>
                <div style={{ color: C.dark, fontWeight: 600, fontSize: '0.9rem' }}>{m.name}</div>
                <div style={{ color: m.color, fontSize: '0.78rem', marginTop: 4 }}>{m.role}</div>
                <a href="pages/equipo.html" className="brand-link">ver perfil →</a>
              </Card>
            ))}
          </div>
        </div>
      );
    }

    /* ── SEGMENTO 3 — Nuestros proyectos ────────────────────── */
    function SegProjects() {
      const projects = [
        {
          name:   'Transformación Digital',
          desc:   'Modernización de las plataformas de gestión de beneficios corporativos mediante integración de APIs y automatización de procesos.',
          color:  C.sky,
          status: 'Completado',
        },
        {
          name:   'Portal de Bienestar',
          desc:   'Plataforma integral de acceso a beneficios y servicios para colaboradores, con experiencia mobile-first y accesibilidad AA.',
          color:  C.green,
          status: 'En curso',
        },
        {
          name:   'Analytics Dashboard',
          desc:   'Sistema de reportería y visualización de datos en tiempo real para la toma de decisiones estratégicas de servicio.',
          color:  C.orange,
          status: 'En planificación',
        },
      ];
      return (
        <div className="h-full flex flex-col items-center justify-center p-8 md:p-14 overflow-y-auto">
          <h2
            className="brand-title"
            style={{ color: C.blue, fontSize: '2rem', fontWeight: 700, fontFamily: 'Arial,sans-serif', marginBottom: '1.75rem', width: '100%', maxWidth: '60rem', margin: '0 auto 1.75rem' }}
          >
            nuestros proyectos
          </h2>
          <div className="grid md:grid-cols-3 gap-6 max-w-5xl w-full">
            {projects.map((p, i) => (
              <Card key={i} accent="left" className="p-6" style={{ paddingLeft: '1.5rem' }}>
                <div style={{ fontWeight: 700, fontSize: '1.05rem', color: p.color, marginBottom: 10 }}>{p.name}</div>
                <p style={{ color: C.dark, fontSize: '0.88rem', lineHeight: 1.65, marginBottom: 16 }}>{p.desc}</p>
                <span className="status-badge" style={{ backgroundColor: p.color }}>{p.status}</span>
                <a href="pages/proyectos.html" className="brand-link" style={{ display: 'block' }}>ver detalle →</a>
              </Card>
            ))}
          </div>
        </div>
      );
    }

    /* ── Configuración de segmentos ─────────────────────────── */
    const SEGMENTS = [
      { id: 0, title: 'home',               Component: SegHome     },
      { id: 1, title: 'quiénes somos',      Component: SegAbout    },
      { id: 2, title: 'nuestro equipo',     Component: SegTeam     },
      { id: 3, title: 'nuestros proyectos', Component: SegProjects },
    ];

    /* ════════════════════════════════════════════════════════
       Componente principal — App
       ════════════════════════════════════════════════════════ */
    function App() {
      /* Estado de la presentación */
      const [displayIdx, setDisplayIdx] = useState(0);   /* índice mostrado actualmente */
      const [animClass,  setAnimClass]  = useState('');  /* clase CSS de animación      */
      const [animating,  setAnimating]  = useState(false);
      const [menuOpen,   setMenuOpen]   = useState(true);
      const menuRef = useRef(null);

      /* ── Navegar a una diapositiva ──────────────────────── */
      const goTo = (idx) => {
        if (idx === displayIdx || animating || idx < 0 || idx >= SEGMENTS.length) return;

        const dir = idx > displayIdx ? 'next' : 'prev';
        setAnimating(true);

        /* 1. Animar salida del slide actual */
        setAnimClass(`slide-exit-${dir}`);

        setTimeout(() => {
          /* 2. Cambiar contenido y animar entrada */
          setDisplayIdx(idx);
          setAnimClass(`slide-enter-${dir}`);

          setTimeout(() => {
            /* 3. Limpiar clases */
            setAnimClass('');
            setAnimating(false);
          }, 400);
        }, 300);
      };

      /* ── Navegación por teclado ─────────────────────────── */
      useEffect(() => {
        const onKey = (e) => {
          if (['ArrowRight', 'ArrowDown', ' '].includes(e.key)) {
            e.preventDefault();
            goTo(displayIdx + 1);
          }
          if (['ArrowLeft', 'ArrowUp'].includes(e.key)) {
            e.preventDefault();
            goTo(displayIdx - 1);
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [displayIdx, animating]);

      /* ── Cerrar menú al hacer clic fuera ────────────────── */
      useEffect(() => {
        const onMouseDown = (e) => {
          if (menuRef.current && !menuRef.current.contains(e.target)) {
            setMenuOpen(false);
          }
        };
        document.addEventListener('mousedown', onMouseDown);
        return () => document.removeEventListener('mousedown', onMouseDown);
      }, []);

      const { Component: CurrentSlide } = SEGMENTS[displayIdx];

      /* ── Render ─────────────────────────────────────────── */
      return (
        <div style={{ display: 'flex', height: '100vh', overflow: 'hidden', background: '#fff' }}>

          {/* ════ MENÚ LATERAL ══════════════════════════════ */}
          <div
            ref={menuRef}
            className="sidebar"
            style={{ width: menuOpen ? 220 : 8 }}
            aria-label="Menú de navegación"
          >
            {/* Borde rojo (menú oculto) */}
            {!menuOpen && (
              <div
                className="sidebar-collapsed-bar"
                onClick={() => setMenuOpen(true)}
                role="button"
                tabIndex={0}
                aria-label="Abrir menú de navegación"
                onKeyDown={e => e.key === 'Enter' && setMenuOpen(true)}
              />
            )}

            {/* Contenido del menú */}
            <div
              className="sidebar-inner"
              style={{ opacity: menuOpen ? 1 : 0, pointerEvents: menuOpen ? 'auto' : 'none' }}
            >
              {/* Cabecera del menú */}
              <div style={{ borderBottom: '1px solid rgba(255,255,255,0.18)', paddingBottom: '1.1rem', marginBottom: '1.4rem' }}>
                {/* Sistema Tarjeta — logo sobre fondo blanco con acento rojo superior */}
                <div style={{
                  background: 'white', borderRadius: 8, padding: '6px 10px',
                  display: 'inline-flex', alignItems: 'center',
                  borderTop: `3px solid ${C.red}`,
                  marginBottom: '0.75rem',
                }}>
                  <img
                    src="assets/logo.png"
                    alt="Sodexo"
                    style={{ height: 32, width: 'auto', display: 'block' }}
                  />
                </div>
                <div style={{ color: 'white', fontWeight: 600, fontSize: '0.82rem' }}>Presentación</div>
                <div style={{ color: 'rgba(255,255,255,0.55)', fontSize: '0.72rem' }}>Equipo de trabajo</div>
              </div>

              {/* Navegación por segmentos */}
              <nav style={{ flex: 1 }}>
                {SEGMENTS.map((seg, i) => (
                  <button
                    key={seg.id}
                    onClick={() => { goTo(i); }}
                    className={`nav-btn ${displayIdx === i ? 'active' : ''}`}
                    aria-current={displayIdx === i ? 'page' : undefined}
                  >
                    <span className="nav-indicator">{i + 1}</span>
                    {seg.title}
                  </button>
                ))}
              </nav>

              {/* Cerrar menú */}
              <button
                onClick={() => setMenuOpen(false)}
                style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'rgba(255,255,255,0.45)', fontSize: '0.72rem', textAlign: 'left', padding: '0.4rem 0', marginTop: '0.75rem' }}
                aria-label="Cerrar menú"
              >
                ‹ cerrar menú
              </button>
            </div>
          </div>

          {/* ════ ÁREA PRINCIPAL ════════════════════════════ */}
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', minWidth: 0 }}>

            {/* ── Encabezado ─────────────────────────────── */}
            <header className="site-header">
              <h1
                className="brand-title"
                style={{ color: C.blue, fontSize: '1.15rem', fontWeight: 700, fontFamily: 'Arial,sans-serif' }}
              >
                presentación del equipo de trabajo
              </h1>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <span style={{ color: C.dark, fontSize: '0.82rem' }}>
                  {displayIdx + 1} / {SEGMENTS.length}
                </span>
                {/* Punto de acento rojo (identidad de marca) */}
                <div style={{ width: 10, height: 10, borderRadius: '50%', backgroundColor: C.red, flexShrink: 0 }} />
              </div>
            </header>

            {/* ── Área de diapositivas ────────────────────── */}
            <div style={{ flex: 1, position: 'relative', overflow: 'hidden' }}>
              <div
                key={`slide-${displayIdx}-${animClass}`}
                className={`slide-container ${animClass}`}
                style={{ position: 'absolute', inset: 0 }}
              >
                <CurrentSlide />
              </div>
            </div>

            {/* ── Footer de navegación ────────────────────── */}
            <footer className="slide-footer">
              <button
                onClick={() => goTo(displayIdx - 1)}
                disabled={displayIdx === 0 || animating}
                className="btn-nav btn-nav-primary"
                aria-label="Diapositiva anterior"
              >
                ← anterior
              </button>

              {/* Indicadores de posición */}
              <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                {SEGMENTS.map((_, i) => (
                  <button
                    key={i}
                    onClick={() => goTo(i)}
                    className={`slide-dot ${displayIdx === i ? 'active' : ''}`}
                    aria-label={`Ir a la diapositiva ${i + 1}: ${SEGMENTS[i].title}`}
                    aria-current={displayIdx === i ? 'step' : undefined}
                  />
                ))}
              </div>

              <button
                onClick={() => goTo(displayIdx + 1)}
                disabled={displayIdx === SEGMENTS.length - 1 || animating}
                className="btn-nav btn-nav-primary"
                aria-label="Siguiente diapositiva"
              >
                siguiente →
              </button>
            </footer>
          </div>
        </div>
      );
    }

    /* ── Montar la app ──────────────────────────────────────── */
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
