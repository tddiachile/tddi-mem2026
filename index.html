<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Presentación del equipo de trabajo — Sodexo" />
  <title>Presentación del Equipo | Sodexo</title>

  <!-- ── Tailwind CSS via CDN ─────────────────────────────────── -->

  <script>
    tailwind.config = {

        extend: {

            'sdx-dark':   '#2A295C',
            'sdx-sky':    '#199CDA',
            'sdx-green':  '#34A866',
            'sdx-teal':   '#228085',
            'sdx-purple': '#915FC8',
            'sdx-pink':   '#DA558C',
            'sdx-orange': '#EF661A',
            'sdx-yellow': '#FCBD4C',
            'sdx-bronze': '#B28B4E',
          },
          fontFamily: {
            body:  ['Open Sans', 'Arial', 'sans-serif'],
            title: ['Arial', 'sans-serif'],          /* Sansa Pro sustituto */
          }

      }

  </script>

  <!-- ── Google Fonts (Open Sans — cuerpo de texto brand) ────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />

  <!-- ── Estilos de marca Sodexo ──────────────────────────────── -->
  <link rel="stylesheet" href="css/styles.css" />

  <!-- ── React 18 + ReactDOM via CDN ─────────────────────────── -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- ── Babel Standalone (transpila JSX en el navegador) ─────── -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- ── Utilidades no-React ──────────────────────────────────── -->
  <script src="js/utils.js"></script>

  <!-- ── D3.js v7 (organigrama interactivo) ───────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
</head>

<body class="bg-white overflow-hidden" style="font-family:'Open Sans',Arial,sans-serif;color:#2A295C;">
  <div id="root"></div>

  <!-- ══════════════════════════════════════════════════════════
       Aplicación React — Presentación del Equipo Sodexo
       ══════════════════════════════════════════════════════════ -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── Paleta de colores (brand tokens) ───────────────────── */
    const C = {
      blue:   '#283897',
      red:    '#EE0000',
      dark:   '#2A295C',
      sky:    '#199CDA',
      green:  '#34A866',
      teal:   '#228085',
      purple: '#915FC8',
      pink:   '#DA558C',
      orange: '#EF661A',
      yellow: '#FCBD4C',
      bronze: '#B28B4E',
    };

    /* ── Sistema Tarjeta Sodexo ─────────────────────────────── */
    /* Bloque blanco redondeado con línea de acento roja        */
    function Card({ children, accent = 'top', className = '', style = {} }) {
      return (
        <div
          className={`sdx-card sdx-card--accent-${accent} ${className}`}
          style={style}
        >
          {children}
        </div>
      );
    }

    /* ── SEGMENTO 0 — Home ──────────────────────────────────── */
    function SegHome({ t }) {
      const th = t.home;
      return (
        <div
          style={{
            height: '100%',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            background: `linear-gradient(135deg, ${C.dark} 0%, ${C.blue} 100%)`,
            position: 'relative',
            overflow: 'hidden',
          }}
        >
          {/* Acento decorativo — círculo translúcido */}
          <div style={{
            position: 'absolute', top: '-80px', right: '-80px',
            width: 340, height: 340, borderRadius: '50%',
            background: 'rgba(255,255,255,0.05)',
          }} />
          <div style={{
            position: 'absolute', bottom: '-60px', left: '-60px',
            width: 240, height: 240, borderRadius: '50%',
            background: 'rgba(255,255,255,0.05)',
          }} />
          {/* Línea de acento roja inferior */}
          <div style={{
            position: 'absolute', bottom: 0, left: 0, right: 0,
            height: 5, background: C.red,
          }} />

          {/* Contenido centrado */}
          <div style={{ textAlign: 'center', padding: '2rem', zIndex: 1 }}>
            {/* Supra-título */}
            <p style={{
              color: 'rgba(255,255,255,0.80)',
              fontSize: 'clamp(0.85rem, 2vw, 1.1rem)',
              fontWeight: 600,
              letterSpacing: '0.18em',
              textTransform: 'uppercase',
              marginBottom: '1.2rem',
            }}>
              {th.supra}
            </p>

            {/* Título principal */}
            <h1 style={{
              color: '#ffffff',
              fontSize: 'clamp(2.2rem, 6vw, 4rem)',
              fontWeight: 700,
              fontFamily: 'Arial, sans-serif',
              lineHeight: 1.15,
              margin: '0 0 1.4rem',
            }}>
              {th.title}
            </h1>

            {/* Separador */}
            <div style={{
              width: 60, height: 4, borderRadius: 2,
              background: C.red,
              margin: '0 auto 1.4rem',
            }} />

            {/* Subtítulo */}
            <p style={{
              color: 'rgba(255,255,255,0.65)',
              fontSize: 'clamp(0.9rem, 2vw, 1.15rem)',
              fontWeight: 400,
              letterSpacing: '0.06em',
              margin: 0,
            }}>
              {th.date}
            </p>
          </div>
        </div>
      );
    }

    /* ── Renderizador del organigrama top-down (D3) ────────── */
    function renderOrgChart(container, ta) {
      /* Dimensiones de nodos */
      const NW = 158;          /* ancho de cada nodo                      */
      const NH0 = 42;          /* alto de nodos compactos (niveles 0 y 1) */
      const S_HEADER = 28;     /* alto del encabezado de área (nivel 2)   */
      const S_ITEM   = 19;     /* alto por ítem de personal               */
      const S_PAD    = 5;      /* padding interno antes/después de ítems  */
      const GAP_H    = 24;     /* gap horizontal entre nodos de nivel 2   */
      const GAP_V    = 48;     /* gap vertical entre niveles              */

      /* Staff de cada área (no forman parte de la jerarquía D3) */
      const proyStaff = [
        { name: 'PMO',              color: C.teal },
        { name: ta.solutionsArch,   color: C.teal },
        { name: ta.projectManagers, color: C.teal, count: 4 },
        { name: ta.devAnalyst,      color: C.teal },
      ];
      const infraStaff = [
        { name: ta.secCoord,    color: C.pink },
        { name: ta.infraCoord,  color: C.pink, count: 2 },
        { name: ta.supportTech, color: C.pink, count: 3 },
        { name: ta.infraMonitor,color: C.pink, count: 2 },
        { name: ta.helpDesk,    color: C.pink },
        { name: ta.itAssistant, color: C.pink },
      ];

      const nhArea = staff => S_HEADER + S_PAD + staff.length * S_ITEM + S_PAD;
      const NH_P = nhArea(proyStaff);   /* ≈ 112 px */
      const NH_I = nhArea(infraStaff);  /* ≈ 150 px */

      /* Jerarquía D3 — sólo 3 niveles; staff va en data.staff */
      const data = {
        name: 'Francisco González', role: ta.directorRole, color: C.dark, nh: NH0,
        children: [{
          name: 'Marcelo Fernández', role: 'CIO', color: C.blue, nh: NH0,
          children: [
            { name: ta.projectsArea, color: C.sky,    nh: NH_P, staff: proyStaff },
            { name: ta.infraSec, role: 'Erwin Morales', color: C.purple, nh: NH_I, staff: infraStaff },
          ],
        }],
      };

      /* Posiciones Y fijas por nivel (top-down manual) */
      const yL = [0, NH0 + GAP_V, NH0 + GAP_V + NH0 + GAP_V];

      /* D3 tree — sólo calcula la coordenada X (spread horizontal) */
      const root = d3.hierarchy(data);
      d3.tree().nodeSize([NW + GAP_H, 1])(root);
      root.each(d => { d.y = yL[d.depth]; });

      /* ViewBox justo al contenido */
      let minX = Infinity, maxX = -Infinity;
      root.each(d => {
        if (d.x < minX) minX = d.x;
        if (d.x > maxX) maxX = d.x;
      });
      const PAD = 14;
      const vbX = minX - NW / 2 - PAD;
      const vbY = -PAD;
      const vbW = (maxX - minX) + NW + PAD * 2;
      const vbH = yL[2] + Math.max(NH_P, NH_I) + PAD;

      d3.select(container).selectAll('svg').remove();

      const svg = d3.select(container)
        .append('svg')
        .attr('viewBox', `${vbX} ${vbY} ${vbW} ${vbH}`)
        .attr('preserveAspectRatio', 'xMidYMid meet')
        .style('width', '100%')
        .style('height', '100%');

      /* Defs: sombra + clipPaths para esquinas redondeadas en áreas */
      const defs = svg.append('defs');
      const flt = defs.append('filter')
        .attr('id', 'nd-shadow').attr('x','-15%').attr('y','-15%')
        .attr('width','130%').attr('height','130%');
      flt.append('feDropShadow')
        .attr('dx', 0).attr('dy', 1).attr('stdDeviation', 2.5)
        .attr('flood-color', 'rgba(0,0,0,0.16)');

      /* ── Conectores — curvas Bézier verticales ── */
      svg.append('g')
        .selectAll('path')
        .data(root.links())
        .join('path')
        .attr('fill', 'none')
        .attr('stroke', '#cbd5e1')
        .attr('stroke-width', 1.5)
        .attr('d', lk => {
          const sx = lk.source.x,  sy = lk.source.y + lk.source.data.nh;
          const tx = lk.target.x,  ty = lk.target.y;
          const my = (sy + ty) / 2;
          return `M${sx},${sy} C${sx},${my} ${tx},${my} ${tx},${ty}`;
        });

      /* ── Nodos ── */
      root.descendants().forEach((d, i) => {
        const isArea = d.depth === 2;
        const nh = d.data.nh;
        const g  = svg.append('g')
          .attr('transform', `translate(${d.x - NW / 2},${d.y})`)
          .attr('filter', 'url(#nd-shadow)');

        if (!isArea) {
          /* Nodos compactos (director, CIO) */
          g.append('rect')
            .attr('width', NW).attr('height', nh).attr('rx', 6)
            .attr('fill', d.data.color);

          g.append('text')
            .attr('x', NW / 2).attr('y', d.data.role ? nh / 2 - 6 : nh / 2)
            .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
            .attr('fill', 'white')
            .attr('font-family', "'Open Sans',Arial,sans-serif")
            .attr('font-size', '9px').attr('font-weight', '700')
            .text(d.data.name);

          if (d.data.role) {
            g.append('text')
              .attr('x', NW / 2).attr('y', nh / 2 + 7)
              .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
              .attr('fill', 'rgba(255,255,255,0.78)')
              .attr('font-family', "'Open Sans',Arial,sans-serif")
              .attr('font-size', '7.5px')
              .text(d.data.role);
          }
        } else {
          /* Nodos de área — encabezado coloreado + lista de personal en blanco */
          const clipId = `clip-area-${i}`;
          defs.append('clipPath').attr('id', clipId)
            .append('rect').attr('width', NW).attr('height', nh).attr('rx', 6);

          const gc = g.append('g').attr('clip-path', `url(#${clipId})`);

          /* Fondo blanco (esquinas redondeadas via clipPath) */
          gc.append('rect').attr('width', NW).attr('height', nh).attr('fill', 'white');

          /* Encabezado coloreado */
          gc.append('rect').attr('width', NW).attr('height', S_HEADER).attr('fill', d.data.color);

          /* Nombre del área */
          gc.append('text')
            .attr('x', NW / 2).attr('y', d.data.role ? S_HEADER / 2 - 5 : S_HEADER / 2)
            .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
            .attr('fill', 'white')
            .attr('font-family', "'Open Sans',Arial,sans-serif")
            .attr('font-size', '9px').attr('font-weight', '700')
            .text(d.data.name);

          if (d.data.role) {
            gc.append('text')
              .attr('x', NW / 2).attr('y', S_HEADER / 2 + 5)
              .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
              .attr('fill', 'rgba(255,255,255,0.82)')
              .attr('font-family', "'Open Sans',Arial,sans-serif")
              .attr('font-size', '7px')
              .text(d.data.role);
          }

          /* Línea separadora */
          gc.append('line')
            .attr('x1', 0).attr('y1', S_HEADER)
            .attr('x2', NW).attr('y2', S_HEADER)
            .attr('stroke', '#e2e8f0').attr('stroke-width', 1);

          /* Ítems de personal */
          d.data.staff.forEach((item, si) => {
            const iy = S_HEADER + S_PAD + si * S_ITEM + S_ITEM / 2;

            gc.append('circle')
              .attr('cx', 10).attr('cy', iy).attr('r', 3.5).attr('fill', item.color);

            gc.append('text')
              .attr('x', 19).attr('y', iy)
              .attr('dominant-baseline', 'middle')
              .attr('fill', '#374151')
              .attr('font-family', "'Open Sans',Arial,sans-serif")
              .attr('font-size', '8px')
              .text(item.name);

            if (item.count) {
              gc.append('circle')
                .attr('cx', NW - 10).attr('cy', iy).attr('r', 7)
                .attr('fill', C.sky).attr('stroke', 'white').attr('stroke-width', 1.5);
              gc.append('text')
                .attr('x', NW - 10).attr('y', iy + 0.5)
                .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
                .attr('fill', 'white')
                .attr('font-family', "'Open Sans',Arial,sans-serif")
                .attr('font-size', '7px').attr('font-weight', '700')
                .text(item.count);
            }
          });
        }
      });
    }

    /* ── SEGMENTO 1 — Quiénes somos + Qué hacemos ────────────── */
    function SegAbout({ t }) {
      const ta = t.about;
      const tw = t.whatWeDo;
      const chartRef = useRef(null);

      useEffect(() => {
        if (chartRef.current) renderOrgChart(chartRef.current, ta);
      }, [t]);

      const AreaCard = ({ title, text, accent }) => (
        <div style={{
          flex: 1,
          display: 'flex',
          flexDirection: 'column',
          background: 'white',
          borderRadius: 10,
          overflow: 'hidden',
          boxShadow: '0 2px 12px rgba(0,0,0,0.08)',
        }}>
          <div style={{ height: 4, background: accent, flexShrink: 0 }} />
          <div style={{ padding: '0.8rem 1.2rem 1rem', display: 'flex', flexDirection: 'column', flex: 1 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', marginBottom: '0.6rem' }}>
              <div style={{ width: 8, height: 8, borderRadius: '50%', background: accent, flexShrink: 0 }} />
              <h3 style={{
                color: C.dark,
                fontSize: 'clamp(0.8rem, 1.4vw, 1rem)',
                fontWeight: 700,
                fontFamily: 'Arial, sans-serif',
                margin: 0,
              }}>
                {title}
              </h3>
            </div>
            <p style={{
              color: '#374151',
              fontSize: 'clamp(0.68rem, 1.1vw, 0.82rem)',
              lineHeight: 1.6,
              margin: 0,
              flex: 1,
            }}>
              {text}
            </p>
          </div>
        </div>
      );

      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>

          {/* Cuerpo — dos mitades */}
          <div style={{ flex: 1, minHeight: 0, display: 'flex' }}>

            {/* Mitad izquierda — organigrama top-down */}
            <div
              ref={chartRef}
              style={{ flex: '0 0 50%', minWidth: 0, padding: '0.5rem 1rem 0.5rem 1.5rem', overflow: 'hidden' }}
            />

            {/* Separador vertical */}
            <div style={{ width: 1, background: '#e5e7eb', flexShrink: 0, margin: '0.25rem 0 0.5rem' }} />

            {/* Mitad derecha — qué hacemos */}
            <div style={{
              flex: 1,
              display: 'flex',
              flexDirection: 'column',
              gap: '0.8rem',
              padding: '0.8rem 1.5rem',
              justifyContent: 'center',
            }}>
              <AreaCard title={tw.digitTitle} text={tw.digitText} accent={C.sky} />
              <AreaCard title={tw.infraTitle} text={tw.infraText} accent={C.purple} />
            </div>

          </div>

          {/* Pie — frase */}
          <div style={{
            padding: '0.5rem 1.75rem 0.6rem',
            flexShrink: 0,
            borderTop: '1px solid #e5e7eb',
          }}>
            <p style={{
              color: C.dark,
              fontSize: 'clamp(0.72rem, 1.2vw, 0.9rem)',
              fontWeight: 600,
              fontFamily: 'Arial, sans-serif',
              fontStyle: 'italic',
              lineHeight: 1.5,
              margin: 0,
              textAlign: 'center',
            }}>
              "{ta.quote}"
            </p>
          </div>
        </div>
      );
    }

    /* ── SEGMENTO 3 — Método de trabajo ─────────────────────── */
    function SegMethod({ t }) {
      const tm = t.method;

      const colorPhase  = C.dark;
      const colorGate   = C.orange;
      const colorTeal   = C.teal;
      const colorChange = C.yellow;
      const colorBanner = '#94A3B8';

      const bannerStyle = (extra = {}) => ({
        background: colorBanner,
        color: 'white',
        textAlign: 'center',
        padding: '7px 0',
        fontWeight: 700,
        fontSize: 'clamp(0.6rem, 1.2vw, 0.78rem)',
        letterSpacing: '0.14em',
        textTransform: 'uppercase',
        flexShrink: 0,
        ...extra,
      });

      const phaseHeaderStyle = {
        background: colorPhase,
        color: 'white',
        textAlign: 'center',
        fontWeight: 700,
        fontSize: 'clamp(0.6rem, 1.2vw, 0.78rem)',
        letterSpacing: '0.1em',
        textTransform: 'uppercase',
        padding: '7px 8px',
        flexShrink: 0,
      };

      /* Bloque vertical (INICIO sub-items y gates) */
      const VertBlock = ({ label, bg, textColor = 'white', width = 'auto' }) => (
        <div style={{
          background: bg,
          color: textColor,
          writingMode: 'vertical-rl',
          transform: 'rotate(180deg)',
          textTransform: 'uppercase',
          fontSize: 'clamp(0.5rem, 1vw, 0.65rem)',
          fontWeight: 700,
          letterSpacing: '0.06em',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          flex: width === 'auto' ? 1 : undefined,
          width: width !== 'auto' ? width : undefined,
          padding: '8px 5px',
          flexShrink: 0,
        }}>
          {label}
        </div>
      );

      /* Chevron en secuencia horizontal con texto vertical */
      /* El clip-path va en el contenedor (sin rotación → apunta a la derecha).
         El writingMode + rotate van solo en el <span> interno.             */
      const TIP = 22;

      const Chevron = ({ label, isFirst }) => (
        <div style={{
          background: colorTeal,
          clipPath: isFirst
            ? `polygon(0 0, calc(100% - ${TIP}px) 0, 100% 50%, calc(100% - ${TIP}px) 100%, 0 100%)`
            : `polygon(0 0, calc(100% - ${TIP}px) 0, 100% 50%, calc(100% - ${TIP}px) 100%, 0 100%, ${TIP}px 50%)`,
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          flex: 1,
          minWidth: 0,
          marginLeft: isFirst ? 0 : -8,
        }}>
          <span style={{
            color: 'white',
            fontSize: 'clamp(0.72rem, 1.3vw, 0.9rem)',
            fontWeight: 700,
            writingMode: 'vertical-rl',
            transform: 'rotate(180deg)',
            letterSpacing: '0.05em',
          }}>
            {label}
          </span>
        </div>
      );

      const PhaseChevrons = ({ steps }) => (
        <div style={{ flex: 1, padding: '6px 18px 6px 8px', display: 'flex', flexDirection: 'row', gap: 4, minHeight: 0 }}>
          {steps.map((s, i) => (
            <Chevron key={i} label={s} isFirst={i === 0} />
          ))}
        </div>
      );

      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>

          {/* Título */}
          <div style={{ padding: '0.85rem 1.75rem 0.6rem', flexShrink: 0 }}>
            <h2 style={{ color: C.blue, fontSize: '1.45rem', fontWeight: 700, fontFamily: 'Arial,sans-serif', margin: 0 }}>
              {tm.heading}
            </h2>
          </div>

          {/* Diagrama */}
          <div style={{ flex: 1, minHeight: 0, display: 'flex', flexDirection: 'column', padding: '0 1.75rem 1.1rem' }}>

            {/* Banner superior */}
            <div style={bannerStyle({ borderRadius: '6px 6px 0 0' })}>{tm.infosec}</div>

            {/* Fila de fases */}
            <div style={{ flex: 1, minHeight: 0, display: 'flex', background: '#EFF3F8', border: '1px solid #e2e8f0', borderTop: 'none', borderBottom: 'none' }}>

              {/* INICIO */}
              <div style={{ display: 'flex', flexDirection: 'column', flexShrink: 0 }}>
                <div style={phaseHeaderStyle}>{tm.phaseInit}</div>
                <div style={{ flex: 1, display: 'flex', gap: 3, padding: 6, minHeight: 0 }}>
                  {tm.initSteps.map((s, i) => <VertBlock key={i} label={s} bg={colorPhase} />)}
                </div>
              </div>

              {/* Gate 1 */}
              <div style={{ display: 'flex', flexShrink: 0 }}>
                <VertBlock label={tm.gateCommittee} bg={colorGate} width={30} />
              </div>

              {/* EVALUACIÓN */}
              <div style={{ display: 'flex', flexDirection: 'column', flex: '1 1 0', minWidth: 0 }}>
                <div style={phaseHeaderStyle}>{tm.phaseEval}</div>
                <PhaseChevrons steps={tm.evalSteps} />
              </div>

              {/* Gate 2 */}
              <div style={{ display: 'flex', flexShrink: 0 }}>
                <VertBlock label={tm.gateCommittee} bg={colorGate} width={30} />
              </div>

              {/* EJECUCIÓN */}
              <div style={{ display: 'flex', flexDirection: 'column', flex: '2 1 0', minWidth: 0 }}>
                <div style={phaseHeaderStyle}>{tm.phaseExec}</div>
                <PhaseChevrons steps={tm.execSteps} />
              </div>

              {/* CHANGE MANAGEMENT */}
              <div style={{ display: 'flex', flexShrink: 0 }}>
                <VertBlock label={tm.changeManagement} bg={colorChange} textColor={C.dark} width={30} />
              </div>

              {/* GO LIVE */}
              <div style={{ display: 'flex', flexDirection: 'column', flex: '1 1 0', minWidth: 0 }}>
                <div style={phaseHeaderStyle}>{tm.phaseGoLive}</div>

    /* ── Renderizador del gráfico de trayectoria (D3) ──────── */
    function renderTrajectoryChart(container, tt) {
      const data = tt.chartData;
      const W = container.clientWidth;
      const H = container.clientHeight;
      if (!W || !H) return;

      const margin = { top: 18, right: 72, bottom: 46, left: 52 };
      const w = W - margin.left - margin.right;
      const h = H - margin.top - margin.bottom;

      d3.select(container).selectAll('svg').remove();

      const svg = d3.select(container)
        .append('svg').attr('width', W).attr('height', H);

      const g = svg.append('g')
        .attr('transform', `translate(${margin.left},${margin.top})`);

      /* Escalas */
      const x = d3.scaleBand()
        .domain(data.map(d => d.year))
        .range([0, w]).padding(0.42);

      const maxP = d3.max(data, d => d.projects);
      const yL = d3.scaleLinear()
        .domain([0, Math.ceil(maxP / 5) * 5 + 8]).nice()
        .range([h, 0]);

      const maxC = d3.max(data, d => d.cumulative);
      const yR = d3.scaleLinear()
        .domain([0, Math.ceil(maxC / 10) * 10 + 10]).nice()
        .range([h, 0]);

      /* Líneas de cuadrícula horizontales */
      g.selectAll('line.hgrid')
        .data(yL.ticks(6))
        .join('line')
        .attr('x1', 0).attr('x2', w)
        .attr('y1', d => yL(d)).attr('y2', d => yL(d))
        .attr('stroke', 'rgba(255,255,255,0.1)')
        .attr('stroke-dasharray', '4,3');

      /* Barras con tope redondeado */
      const rx = 5;
      data.forEach(d => {
        const bx = x(d.year), bw = x.bandwidth();
        const by = yL(d.projects), bh = h - by;
        g.append('path')
          .attr('d', `M${bx},${h} L${bx},${by+rx} Q${bx},${by} ${bx+rx},${by} L${bx+bw-rx},${by} Q${bx+bw},${by} ${bx+bw},${by+rx} L${bx+bw},${h} Z`)
          .attr('fill', 'rgba(180,200,240,0.32)')
          .attr('stroke', 'rgba(210,220,255,0.45)')
          .attr('stroke-width', 1);

        /* Etiqueta de valor sobre la barra */
        g.append('text')
          .attr('x', bx + bw / 2).attr('y', by - 7)
          .attr('text-anchor', 'middle')
          .attr('fill', 'rgba(255,255,255,0.80)')
          .attr('font-family', "'Open Sans',Arial,sans-serif")
          .attr('font-size', '11px').attr('font-weight', '700')
          .text(d.projects);
      });

      /* Eje izquierdo */
      g.append('g')
        .call(d3.axisLeft(yL).ticks(6).tickSize(0))
        .call(ag => {
          ag.select('.domain').attr('stroke', 'rgba(255,255,255,0.2)');
          ag.selectAll('text').attr('fill','rgba(255,255,255,0.6)')
            .attr('font-family',"'Open Sans',Arial,sans-serif")
            .attr('font-size','10px').attr('dx','-3px');
        });

      /* Eje derecho (rojo) */
      g.append('g')
        .attr('transform', `translate(${w},0)`)
        .call(d3.axisRight(yR).ticks(6).tickSize(0))
        .call(ag => {
          ag.select('.domain').attr('stroke','rgba(238,0,0,0.35)');
          ag.selectAll('text').attr('fill','rgba(238,0,0,0.85)')
            .attr('font-family',"'Open Sans',Arial,sans-serif")
            .attr('font-size','10px').attr('dx','3px');
        });

      /* Eje X */
      g.append('g')
        .attr('transform', `translate(0,${h})`)
        .call(d3.axisBottom(x).tickSize(0))
        .call(ag => {
          ag.select('.domain').attr('stroke','rgba(255,255,255,0.2)');
          ag.selectAll('text').attr('fill','white')
            .attr('font-family',"'Open Sans',Arial,sans-serif")
            .attr('font-size','13px').attr('font-weight','600')
            .attr('dy','1.25em');
        });

      /* Línea de acumulado histórico */
      const lineGen = d3.line()
        .x(d => x(d.year) + x.bandwidth() / 2)
        .y(d => yR(d.cumulative))
        .curve(d3.curveCatmullRom.alpha(0.5));

      g.append('path')
        .datum(data)
        .attr('fill','none')
        .attr('stroke','#EE0000')
        .attr('stroke-width', 2.5)
        .attr('d', lineGen);

      /* Puntos y etiquetas de la línea */
      data.forEach(d => {
        const cx = x(d.year) + x.bandwidth() / 2;
        const cy = yR(d.cumulative);

        g.append('circle')
          .attr('cx', cx).attr('cy', cy).attr('r', 5)
          .attr('fill','#EE0000')
          .attr('stroke','rgba(255,255,255,0.9)').attr('stroke-width', 2);

        g.append('text')
          .attr('x', cx + 8).attr('y', cy - 8)
          .attr('fill','rgba(238,0,0,0.9)')
          .attr('font-family',"'Open Sans',Arial,sans-serif")
          .attr('font-size','10px').attr('font-weight','700')
          .text(d.cumulative);
      });
    }

    /* ── Renderizador de Carta Gantt (D3) ───────────────────── */
    function renderGanttChart(container, tcp) {
      const parse = d3.timeParse('%Y-%m-%d');
      const fmt   = d3.timeFormat('%d/%m/%y');
      const data  = tcp.projects.map(p => ({
        name:  p.name,
        start: parse(p.start),
        end:   parse(p.end),
      }));

      const W = container.clientWidth;
      const H = container.clientHeight;
      if (!W || !H) return;

      const rowH     = Math.max(Math.floor(H / (data.length + 1.5)), 52);
      const chartH   = rowH * data.length;
      const margin   = { top: 52, right: 24, bottom: 12, left: 320 };
      const totalH   = margin.top + chartH + margin.bottom;
      const w        = W - margin.left - margin.right;

      d3.select(container).selectAll('svg').remove();

      const svgH = Math.max(totalH, H);
      const svg = d3.select(container)
        .append('svg')
        .attr('width', W)
        .attr('height', svgH)
        .style('display', 'block');

      const xMin = new Date(2024, 3, 1);   /* 1 Abr 2024  */
      const xMax = new Date(2027, 0, 1);   /* 1 Ene 2027  */

      const x = d3.scaleTime().domain([xMin, xMax]).range([0, w]);

      const y = d3.scaleBand()
        .domain(data.map(d => d.name))
        .range([0, chartH]).padding(0.25);

      const today = new Date();

      /* ── Capa 1: Fondos alternados de fila ── */
      const bgLayer = svg.append('g').attr('class', 'bg-layer');
      data.forEach((d, i) => {
        bgLayer.append('rect')
          .attr('x', 0)
          .attr('y', margin.top + y(d.name) - y.step() * y.paddingInner() / 2)
          .attr('width', W).attr('height', y.step())
          .attr('fill', i % 2 === 0 ? '#EDF2F7' : '#FFFFFF');
      });

      /* Separador vertical entre nombres y barras */
      bgLayer.append('line')
        .attr('x1', margin.left - 1).attr('x2', margin.left - 1)
        .attr('y1', 0).attr('y2', svgH)
        .attr('stroke', '#CBD5E0').attr('stroke-width', 1);

      /* ── Capa 2: Cuadrícula y ejes (dentro del grupo con transform) ── */
      const g = svg.append('g')
        .attr('transform', `translate(${margin.left},${margin.top})`);

      /* Líneas de cuadrícula mensuales */
      d3.timeMonth.range(xMin, xMax).forEach(dt => {
        const isJan = dt.getMonth() === 0;
        g.append('line')
          .attr('x1', x(dt)).attr('x2', x(dt))
          .attr('y1', isJan ? -margin.top : -28)
          .attr('y2', chartH)
          .attr('stroke', isJan ? '#A0AEC0' : '#E2E8F0')
          .attr('stroke-width', isJan ? 1.2 : 0.5);
      });

      /* Etiquetas de año y trimestre */
      d3.timeMonth.every(3).range(xMin, xMax).forEach(dt => {
        const isJan = dt.getMonth() === 0;
        g.append('text')
          .attr('x', isJan ? x(dt) + 5 : x(dt))
          .attr('y', isJan ? -margin.top + 18 : -12)
          .attr('text-anchor', isJan ? 'start' : 'middle')
          .attr('fill', isJan ? C.dark : '#4A5568')
          .attr('font-family', "'Open Sans',Arial,sans-serif")
          .attr('font-size', isJan ? '15px' : '12px')
          .attr('font-weight', isJan ? '700' : '500')
          .text(isJan ? d3.timeFormat('%Y')(dt) : d3.timeFormat('%b')(dt));
      });

      /* Marcador de hoy */
      if (today >= xMin && today <= xMax) {
        g.append('line')
          .attr('x1', x(today)).attr('x2', x(today))
          .attr('y1', -margin.top + 2).attr('y2', chartH)
          .attr('stroke', C.red).attr('stroke-width', 2)
          .attr('stroke-dasharray', '6,3');
        g.append('text')
          .attr('x', x(today)).attr('y', -margin.top + 15)
          .attr('text-anchor', 'middle')
          .attr('fill', C.red)
          .attr('font-family', "'Open Sans',Arial,sans-serif")
          .attr('font-size', '12px').attr('font-weight', '700')
          .text(tcp.today);
      }

      /* ── Capa 3: Barras Gantt ── */
      const barLayer = svg.append('g')
        .attr('transform', `translate(${margin.left},${margin.top})`);

      data.forEach(d => {
        const bx = x(d.start);
        const bw = Math.max(x(d.end) - x(d.start), 8);
        const by = y(d.name);
        const bh = y.bandwidth();
        const rc = 6;

        /* Porción total — azul claro */
        barLayer.append('rect')
          .attr('x', bx).attr('y', by)
          .attr('width', bw).attr('height', bh)
          .attr('fill', 'rgba(40,56,151,0.25)')
          .attr('rx', rc).attr('ry', rc);

        /* Porción transcurrida — azul sólido */
        const elapsedEnd = today < d.start ? d.start : today > d.end ? d.end : today;
        const elapsedW   = Math.max(x(elapsedEnd) - x(d.start), 0);
        if (elapsedW > 0) {
          barLayer.append('rect')
            .attr('x', bx).attr('y', by)
            .attr('width', elapsedW).attr('height', bh)
            .attr('fill', C.blue)
            .attr('rx', rc).attr('ry', rc);
        }

        /* Fechas dentro de la barra */
        if (bw > 100) {
          barLayer.append('text')
            .attr('x', bx + bw / 2).attr('y', by + bh / 2 + 5)
            .attr('text-anchor', 'middle')
            .attr('fill', '#FFFFFF')
            .attr('font-family', "'Open Sans',Arial,sans-serif")
            .attr('font-size', '12px').attr('font-weight', '600')
            .style('paint-order', 'stroke fill')
            .style('stroke', 'rgba(40,56,151,0.6)').style('stroke-width', '3px')
            .text(`${fmt(d.start)}  →  ${fmt(d.end)}`);
        }
      });

      /* ── Capa 4: Nombres de proyecto (encima de todo) ── */
      const labelLayer = svg.append('g').attr('class', 'label-layer');
      data.forEach(d => {
        const by = y(d.name);
        const bh = y.bandwidth();
        labelLayer.append('text')
          .attr('x', margin.left - 14)
          .attr('y', margin.top + by + bh / 2)
          .attr('text-anchor', 'end')
          .attr('dominant-baseline', 'central')
          .attr('fill', C.dark)
          .attr('font-family', "'Open Sans',Arial,sans-serif")
          .attr('font-size', '15px').attr('font-weight', '700')
          .text(d.name);
      });

      /* Línea base inferior */
      g.append('line')
        .attr('x1', 0).attr('x2', w)
        .attr('y1', chartH).attr('y2', chartH)
        .attr('stroke', '#CBD5E0').attr('stroke-width', 1);
    }

            fontSize: 'clamp(0.82rem, 1.3vw, 1rem)', fontWeight: 700,
            textTransform: 'uppercase', letterSpacing: '0.06em', color: C.dark,
          }}>{text}</span>
        </div>
      );

      const statusColor = (icon) => icon === 'check' ? C.green : C.sky;
      const statusEmoji = (icon) => icon === 'check' ? '✅' : '🔄';

      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>

          {/* Título + subtítulo */}
          <div style={{ padding: '0.7rem 1.75rem 0.15rem', flexShrink: 0 }}>
            <h2 style={{ color: C.blue, fontSize: 'clamp(1.3rem, 2.8vw, 1.8rem)', fontWeight: 700, fontFamily: 'Arial, sans-serif', margin: 0 }}>{ts.heading}</h2>
            <p style={{ color: '#6B7280', fontSize: 'clamp(0.85rem, 1.4vw, 1.05rem)', fontStyle: 'italic', margin: '0.2rem 0 0' }}>{ts.subtitle}</p>
          </div>

          {/* Contenido — 2 columnas: izquierda (AI + IoT) | derecha (Dev Stack) */}
          <div style={{ flex: 1, minHeight: 0, display: 'flex', gap: '1rem', padding: '0.4rem 1.75rem 0.8rem', overflow: 'hidden' }}>

            {/* ── Columna izquierda: AI + IoT ── */}
            <div style={{ flex: '1.4 1 0', display: 'flex', flexDirection: 'column', gap: '0.7rem', minHeight: 0, overflow: 'auto' }}>

              {/* AI Section */}
              <div style={{ background: 'white', borderRadius: 8, boxShadow: '0 1px 8px rgba(0,0,0,0.06)', overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
                <div style={{ height: 4, background: C.purple, flexShrink: 0 }} />
                <div style={{ padding: '0.7rem 1rem 0.6rem' }}>
                  <SectionBadge icon="🤖" text={ts.aiTitle} />
                  <p style={{ color: C.dark, fontSize: 'clamp(0.82rem, 1.3vw, 1rem)', fontWeight: 600, margin: '0.3rem 0 0.5rem', fontStyle: 'italic' }}>{ts.aiIntro}</p>

                  {/* Tabla AI */}
                  <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 'clamp(0.75rem, 1.2vw, 0.9rem)' }}>
                    <thead>
                      <tr style={{ background: C.dark, color: 'white' }}>
                        {[ts.aiColInitiative, ts.aiColDesc, ts.aiColStatus, ts.aiColTech].map((h, i) => (
                          <th key={i} style={{ padding: '6px 10px', fontWeight: 700, textAlign: 'left', fontSize: 'clamp(0.7rem, 1.1vw, 0.85rem)', letterSpacing: '0.03em' }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {ts.aiItems.map((item, i) => (
                        <tr key={i} style={{ background: i % 2 === 0 ? '#F9FAFB' : 'white', borderBottom: '1px solid #E5E7EB' }}>
                          <td style={{ padding: '6px 10px', fontWeight: 700, color: C.dark, whiteSpace: 'nowrap' }}>{item.name}</td>
                          <td style={{ padding: '6px 10px', color: '#374151', lineHeight: 1.45 }}>{item.desc}</td>
                          <td style={{ padding: '6px 10px', whiteSpace: 'nowrap' }}>
                            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, color: statusColor(item.statusIcon), fontWeight: 600 }}>
                              <span style={{ fontSize: '0.85rem' }}>{statusEmoji(item.statusIcon)}</span> {item.status}
                            </span>
                          </td>
                          <td style={{ padding: '6px 10px', color: '#4B5563', fontWeight: 600, whiteSpace: 'nowrap' }}>{item.tech}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* IoT Section */}
              <div style={{ background: 'white', borderRadius: 8, boxShadow: '0 1px 8px rgba(0,0,0,0.06)', overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
                <div style={{ height: 4, background: C.green, flexShrink: 0 }} />
                <div style={{ padding: '0.7rem 1rem 0.6rem' }}>
                  <SectionBadge icon="📡" text={ts.iotTitle} />
                  <div style={{ display: 'flex', alignItems: 'baseline', gap: '0.5rem', margin: '0.35rem 0 0.3rem' }}>
                    <span style={{ fontWeight: 700, color: C.dark, fontSize: 'clamp(0.85rem, 1.3vw, 1.05rem)' }}>{ts.iotProject}</span>
                    <span style={{ color: '#6B7280', fontSize: 'clamp(0.75rem, 1.1vw, 0.88rem)' }}>({ts.iotPeriod})</span>
                  </div>
                  <p style={{ color: '#374151', fontSize: 'clamp(0.82rem, 1.3vw, 1rem)', lineHeight: 1.6, margin: '0 0 0.4rem' }}>{ts.iotText}</p>
                  <div style={{ borderTop: '1px solid #E5E7EB', paddingTop: '0.4rem', color: C.green, fontSize: 'clamp(0.82rem, 1.3vw, 1rem)', fontWeight: 600, fontStyle: 'italic' }}>{ts.iotImpact}</div>
                </div>
              </div>
            </div>

            {/* ── Columna derecha: Dev Stack ── */}
            <div style={{ flex: '1 1 0', display: 'flex', flexDirection: 'column', minHeight: 0 }}>
              <div style={{ background: 'white', borderRadius: 8, boxShadow: '0 1px 8px rgba(0,0,0,0.06)', overflow: 'hidden', display: 'flex', flexDirection: 'column', flex: 1 }}>
                <div style={{ height: 4, background: C.sky, flexShrink: 0 }} />
                <div style={{ padding: '0.7rem 1rem 0.6rem', display: 'flex', flexDirection: 'column', flex: 1 }}>
                  <SectionBadge icon="🛠️" text={ts.devTitle} />
                  <p style={{ color: '#374151', fontSize: 'clamp(0.82rem, 1.3vw, 1rem)', lineHeight: 1.55, margin: '0.3rem 0 0.6rem' }}>{ts.devIntro}</p>

                  {/* Capas del stack */}
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '0.85rem', flex: 1 }}>
                    {ts.devLayers.map((layer, li) => (
                      <div key={li}>
                        <div style={{
                          fontSize: 'clamp(0.72rem, 1.1vw, 0.85rem)', fontWeight: 700,
                          textTransform: 'uppercase', letterSpacing: '0.08em',
                          color: C.sky, marginBottom: '0.4rem',
                        }}>{layer.layer}</div>
                        <div style={{ display: 'flex', gap: '0.55rem', flexWrap: 'wrap' }}>
                          {layer.techs.map((tech, ti) => (
                            <div key={ti} style={{
                              display: 'flex', alignItems: 'center', gap: 8,
                              background: '#F0F4F8', border: '1px solid #E2E8F0',
                              borderRadius: 6, padding: '8px 12px',
                            }}>
                              {DEV_ICONS[tech] && (
                                <img src={DEV_ICONS[tech]} alt={tech}
                                  style={{ width: 26, height: 26, objectFit: 'contain' }}
                                  onError={(e) => { e.target.style.display = 'none'; }}
                                />
                              )}
                              <span style={{
                                fontSize: 'clamp(0.82rem, 1.3vw, 0.98rem)',
                                fontWeight: 600, color: C.dark,
                              }}>{tech}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>

                  {/* Cierre */}
                  <div style={{ marginTop: 'auto', paddingTop: '0.6rem', borderTop: '1px solid #E5E7EB', color: C.sky, fontSize: 'clamp(0.82rem, 1.3vw, 1rem)', fontWeight: 600, fontStyle: 'italic' }}>{ts.devClosing}</div>
                </div>
              </div>
            </div>

          </div>

          {/* Acento rojo inferior */}
          <div style={{ height: 4, background: C.red, flexShrink: 0 }} />
        </div>
      );
    }

    /* ── Configuración de segmentos ─────────────────────────── */
    const SEGMENTS_CONFIG = [
      { id: 0,  Component: SegHome            },
      { id: 1,  Component: SegAbout           },
      { id: 2,  Component: SegMethod          },
      { id: 3,  Component: SegTrajectory      },
      { id: 4,  Component: SegMetrics         },
      { id: 5,  Component: SegPortfolio       },
      { id: 6,  Component: SegCurrentProjects },
      { id: 7,  Component: SegRegionalReach   },
      { id: 8,  Component: SegGlobalPlatforms },
      { id: 9,  Component: SegTechStack       },
      { id: 10, Component: SegImprovements    },
    ];

    /* ════════════════════════════════════════════════════════
       Componente principal — App
       ════════════════════════════════════════════════════════ */
    function App({ locales }) {
      const [lang,       setLang]       = useState('es');
      const [displayIdx, setDisplayIdx] = useState(0);
      const [animClass,  setAnimClass]  = useState('');
      const [animating,  setAnimating]  = useState(false);
      const [menuOpen,   setMenuOpen]   = useState(true);
      const menuRef = useRef(null);

      const t        = locales[lang];
      const SEGMENTS = SEGMENTS_CONFIG.map((s, i) => ({ ...s, title: t.segments[i] }));

      /* ── Sincronizar lang con el documento ──────────────── */
      useEffect(() => {
        document.title = t.pageTitle;
        document.documentElement.lang = lang;
      }, [lang]);

      /* ── Alternar idioma ────────────────────────────────── */
      const toggleLang = () => setLang(l => l === 'es' ? 'en' : 'es');

      /* ── Navegar a una diapositiva ──────────────────────── */
      const goTo = (idx) => {
        if (idx === displayIdx || animating || idx < 0 || idx >= SEGMENTS.length) return;

        const dir = idx > displayIdx ? 'next' : 'prev';
        setAnimating(true);

        /* 1. Animar salida del slide actual */
        setAnimClass(`slide-exit-${dir}`);

        setTimeout(() => {
          /* 2. Cambiar contenido y animar entrada */
          setDisplayIdx(idx);
          setAnimClass(`slide-enter-${dir}`);

          setTimeout(() => {
            /* 3. Limpiar clases */
            setAnimClass('');
            setAnimating(false);
          }, 400);
        }, 300);
      };

      /* ── Navegación por teclado ─────────────────────────── */
      useEffect(() => {
        const onKey = (e) => {
          if (['ArrowRight', 'ArrowDown', ' '].includes(e.key)) {
            e.preventDefault();
            goTo(displayIdx + 1);
          }
          if (['ArrowLeft', 'ArrowUp'].includes(e.key)) {
            e.preventDefault();
            goTo(displayIdx - 1);
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [displayIdx, animating]);

      /* ── Cerrar menú al hacer clic fuera ────────────────── */
      useEffect(() => {
        const onMouseDown = (e) => {
          if (menuRef.current && !menuRef.current.contains(e.target)) {
            setMenuOpen(false);
          }
        };
        document.addEventListener('mousedown', onMouseDown);
        return () => document.removeEventListener('mousedown', onMouseDown);
      }, []);

      const { Component: CurrentSlide } = SEGMENTS[displayIdx];

      /* ── Render ─────────────────────────────────────────── */
      return (
        <div style={{ display: 'flex', height: '100vh', overflow: 'hidden', background: '#fff' }}>

          {/* ════ MENÚ LATERAL ══════════════════════════════ */}
          <div
            ref={menuRef}
            className="sidebar"
            style={{ width: menuOpen ? 220 : 8 }}
            aria-label={t.ariaOpenMenu}
          >
            {/* Borde rojo (menú oculto) */}
            {!menuOpen && (
              <div
                className="sidebar-collapsed-bar"
                onClick={() => setMenuOpen(true)}
                role="button"
                tabIndex={0}
                aria-label={t.ariaOpenMenu}
                onKeyDown={e => e.key === 'Enter' && setMenuOpen(true)}
              />
            )}

            {/* Contenido del menú */}
            <div
              className="sidebar-inner"
              style={{ opacity: menuOpen ? 1 : 0, pointerEvents: menuOpen ? 'auto' : 'none' }}
            >
              {/* Cabecera del menú */}
              <div style={{ borderBottom: '1px solid rgba(255,255,255,0.18)', paddingBottom: '0.4rem', marginBottom: '0.35rem' }}>
                <div style={{
                  background: 'white', borderRadius: 5, padding: '3px 7px',
                  display: 'inline-flex', alignItems: 'center',
                  borderTop: `2px solid ${C.red}`,
                  marginBottom: '0.3rem',
                }}>
                  <img
                    src="assets/logo.png"
                    alt="Sodexo"
                    style={{ height: 22, width: 'auto', display: 'block' }}
                  />
                </div>
                <div style={{ color: 'white', fontWeight: 600, fontSize: '0.64rem' }}>{t.sidebarTitle}</div>
                <div style={{ color: 'rgba(255,255,255,0.55)', fontSize: '0.56rem' }}>{t.sidebarSubtitle}</div>
              </div>

              {/* Navegación por segmentos */}
              <nav style={{ flex: 1 }}>
                {SEGMENTS.map((seg, i) => (
                  <button
                    key={seg.id}
                    onClick={() => { goTo(i); }}
                    className={`nav-btn ${displayIdx === i ? 'active' : ''}`}
                    aria-current={displayIdx === i ? 'page' : undefined}
                  >
                    <span className="nav-indicator">{i + 1}</span>
                    {seg.title}
                  </button>
                ))}
              </nav>

              {/* Cerrar menú */}
              <button
                onClick={() => setMenuOpen(false)}
                style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'rgba(255,255,255,0.45)', fontSize: '0.58rem', textAlign: 'left', padding: '0.25rem 0', marginTop: '0.3rem' }}
                aria-label={t.ariaCloseMenu}
              >
                {t.sidebarClose}
              </button>
            </div>
          </div>

          {/* ════ ÁREA PRINCIPAL ════════════════════════════ */}
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', minWidth: 0 }}>

            {/* ── Encabezado ─────────────────────────────── */}
            <header
              className="site-header"
              style={{ display: 'grid', gridTemplateColumns: '1fr auto 1fr', alignItems: 'center', gap: '1rem' }}
            >
              {/* Título — columna izquierda */}
              <h1
                className="brand-title"
                style={{ color: C.blue, fontSize: '1.15rem', fontWeight: 700, fontFamily: 'Arial,sans-serif', margin: 0 }}
              >
                {SEGMENTS[displayIdx].title}
              </h1>

              {/* Botón de idioma — columna central */}
              <button
                onClick={toggleLang}
                aria-label={lang === 'es' ? 'Switch to English' : 'Cambiar a español'}
                style={{
                  background: C.blue,
                  color: '#ffffff',
                  border: 'none',
                  borderRadius: 20,
                  padding: '4px 16px',
                  fontSize: '0.78rem',
                  fontWeight: 700,
                  letterSpacing: '0.08em',
                  cursor: 'pointer',
                  fontFamily: "'Open Sans', Arial, sans-serif",
                  transition: 'background 180ms ease',
                }}
                onMouseEnter={e => e.currentTarget.style.background = '#1e2c7a'}
                onMouseLeave={e => e.currentTarget.style.background = C.blue}
              >
                {t.langToggle}
              </button>

              {/* Contador — columna derecha */}
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, justifyContent: 'flex-end' }}>
                <span style={{ color: C.dark, fontSize: '0.82rem' }}>
                  {displayIdx + 1} / {SEGMENTS.length}
                </span>
                {/* Punto de acento rojo (identidad de marca) */}
                <div style={{ width: 10, height: 10, borderRadius: '50%', backgroundColor: C.red, flexShrink: 0 }} />
              </div>
            </header>

            {/* ── Área de diapositivas ────────────────────── */}
            <div style={{ flex: 1, position: 'relative', overflow: 'hidden' }}>
              <div
                key={`slide-${displayIdx}-${animClass}`}
                className={`slide-container ${animClass}`}
                style={{ position: 'absolute', inset: 0 }}
              >
                <CurrentSlide t={t} />
              </div>
            </div>

            {/* ── Footer de navegación ────────────────────── */}
            <footer className="slide-footer">
              <button
                onClick={() => goTo(displayIdx - 1)}
                disabled={displayIdx === 0 || animating}
                className="btn-nav btn-nav-primary"
                aria-label={t.ariaPrev}
              >
                {t.prev}
              </button>

              {/* Indicadores de posición */}
              <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                {SEGMENTS.map((_, i) => (
                  <button
                    key={i}
                    onClick={() => goTo(i)}
                    className={`slide-dot ${displayIdx === i ? 'active' : ''}`}
                    aria-label={`${t.ariaGoTo} ${i + 1}: ${SEGMENTS[i].title}`}
                    aria-current={displayIdx === i ? 'step' : undefined}
                  />
                ))}
              </div>

              <button
                onClick={() => goTo(displayIdx + 1)}
                disabled={displayIdx === SEGMENTS.length - 1 || animating}
                className="btn-nav btn-nav-primary"
                aria-label={t.ariaNext}
              >
                {t.next}
              </button>
            </footer>
          </div>
        </div>
      );
    }

    /* ── Cargar traducciones y montar la app ────────────────── */
    fetch('locales.json?v=5')
      .then(r => r.json())
      .then(locales => {
        ReactDOM.createRoot(document.getElementById('root')).render(<App locales={locales} />);
      });
  </script>
</body>
</html>
