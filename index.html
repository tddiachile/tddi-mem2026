<html lang="es">
<head>

  <!-- ── Google Fonts (Open Sans — cuerpo de texto brand) ────── -->

  <!-- ── Estilos de marca Sodexo ──────────────────────────────── -->

  <!-- ── React 18 + ReactDOM via CDN ─────────────────────────── -->

<body class="bg-white overflow-hidden" style="font-family:'Open Sans',Arial,sans-serif;color:#2A295C;">
  <div id="root"></div>

  <!-- ══════════════════════════════════════════════════════════
       Aplicación React — Presentación del Equipo Sodexo
       ══════════════════════════════════════════════════════════ -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── Paleta de colores (brand tokens) ───────────────────── */
    const C = {
      blue:   '#283897',
      red:    '#EE0000',
      dark:   '#2A295C',
      sky:    '#199CDA',
      green:  '#34A866',
      teal:   '#228085',
      purple: '#915FC8',
      pink:   '#DA558C',
      orange: '#EF661A',
      yellow: '#FCBD4C',
      bronze: '#B28B4E',
    };

    /* ── Sistema Tarjeta Sodexo ─────────────────────────────── */
    /* Bloque blanco redondeado con línea de acento roja        */
    function Card({ children, accent = 'top', className = '', style = {} }) {
      return (
        <div
          className={`sdx-card sdx-card--accent-${accent} ${className}`}
          style={style}
        >
          {children}
        </div>
      );
    }

    /* ── SEGMENTO 0 — Home ──────────────────────────────────── */
    function SegHome({ t }) {
      const th = t.home;
      return (
        <div
          style={{
            height: '100%',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            background: `linear-gradient(135deg, ${C.dark} 0%, ${C.blue} 100%)`,
            position: 'relative',
            overflow: 'hidden',
          }}
        >
          {/* Acento decorativo — círculo translúcido */}
          <div style={{
            position: 'absolute', top: '-80px', right: '-80px',
            width: 340, height: 340, borderRadius: '50%',
            background: 'rgba(255,255,255,0.05)',
          }} />
          <div style={{
            position: 'absolute', bottom: '-60px', left: '-60px',
            width: 240, height: 240, borderRadius: '50%',
            background: 'rgba(255,255,255,0.05)',
          }} />
          {/* Línea de acento roja inferior */}
          <div style={{
            position: 'absolute', bottom: 0, left: 0, right: 0,
            height: 5, background: C.red,
          }} />

          {/* Contenido centrado */}
          <div style={{ textAlign: 'center', padding: '2rem', zIndex: 1 }}>
            {/* Supra-título */}
            {th.supra && <p style={{
              color: 'rgba(255,255,255,0.80)',
              fontSize: 'clamp(0.85rem, 2vw, 1.1rem)',
              fontWeight: 600,
              letterSpacing: '0.18em',
              textTransform: 'uppercase',
              marginBottom: '1.2rem',
            }}>
              {th.supra}
            </p>}

            {/* Título principal */}
            <h1 style={{
              color: '#ffffff',
              fontSize: 'clamp(2.2rem, 6vw, 4rem)',
              fontWeight: 700,
              fontFamily: 'Arial, sans-serif',
              lineHeight: 1.15,
              margin: '0 0 1.4rem',
            }}>
              {th.title}
            </h1>

            {/* Separador */}
            <div style={{
              width: 60, height: 4, borderRadius: 2,
              background: C.red,
              margin: '0 auto 1.4rem',
            }} />

            {/* Subtítulo */}
            <p style={{
              color: 'rgba(255,255,255,0.65)',
              fontSize: 'clamp(0.9rem, 2vw, 1.15rem)',
              fontWeight: 400,
              letterSpacing: '0.06em',
              margin: 0,
            }}>
              {th.date}
            </p>
          </div>
        </div>
      );
    }

    /* ── Renderizador del organigrama top-down (D3) ────────── */
    function renderOrgChart(container, ta) {
      /* Dimensiones de nodos */
      const NW = 158;          /* ancho de cada nodo                      */
      const NH0 = 42;          /* alto de nodos compactos (niveles 0 y 1) */
      const S_HEADER = 28;     /* alto del encabezado de área (nivel 2)   */
      const S_ITEM   = 19;     /* alto por ítem de personal               */
      const S_PAD    = 5;      /* padding interno antes/después de ítems  */
      const GAP_H    = 24;     /* gap horizontal entre nodos de nivel 2   */
      const GAP_V    = 48;     /* gap vertical entre niveles              */

      /* Staff de cada área (no forman parte de la jerarquía D3) */
      const proyStaff = [
        { name: 'PMO',              color: C.teal },
        { name: ta.solutionsArch,   color: C.teal },
        { name: ta.projectManagers, color: C.teal, count: 4 },
        { name: ta.devAnalyst,      color: C.teal },
      ];
      const infraStaff = [
        { name: ta.secCoord,    color: C.pink },
        { name: ta.infraCoord,  color: C.pink, count: 2 },
        { name: ta.supportTech, color: C.pink, count: 3 },
        { name: ta.infraMonitor,color: C.pink, count: 2 },
        { name: ta.helpDesk,    color: C.pink },
        { name: ta.itAssistant, color: C.pink },
      ];

      const nhArea = staff => S_HEADER + S_PAD + staff.length * S_ITEM + S_PAD;
      const NH_P = nhArea(proyStaff);   /* ≈ 112 px */
      const NH_I = nhArea(infraStaff);  /* ≈ 150 px */

      /* Jerarquía D3 — sólo 3 niveles; staff va en data.staff */
      const data = {
        name: 'Francisco González', role: ta.directorRole, color: C.dark, nh: NH0,
        children: [{
          name: 'Marcelo Fernández', role: 'CIO', color: C.blue, nh: NH0,
          children: [
            { name: ta.projectsArea, color: C.sky,    nh: NH_P, staff: proyStaff, personCount: 8 },
            { name: ta.infraSec, role: 'Erwin Morales', color: C.purple, nh: NH_I, staff: infraStaff, personCount: 11 },
          ],
        }],
      };

      /* Posiciones Y fijas por nivel (top-down manual) */
      const yL = [0, NH0 + GAP_V, NH0 + GAP_V + NH0 + GAP_V];

      /* D3 tree — sólo calcula la coordenada X (spread horizontal) */
      const root = d3.hierarchy(data);
      d3.tree().nodeSize([NW + GAP_H, 1])(root);
      root.each(d => { d.y = yL[d.depth]; });

      /* ViewBox justo al contenido */
      let minX = Infinity, maxX = -Infinity;
      root.each(d => {
        if (d.x < minX) minX = d.x;
        if (d.x > maxX) maxX = d.x;
      });
      const PAD = 14;
      const BADGE_H = 52;   /* espacio extra en la parte superior para el badge */
      const vbX = minX - NW / 2 - PAD;
      const vbY = -PAD - BADGE_H;
      const vbW = (maxX - minX) + NW + PAD * 2;
      const vbH = yL[2] + Math.max(NH_P, NH_I) + PAD + BADGE_H;

      d3.select(container).selectAll('svg').remove();

      const svg = d3.select(container)
        .append('svg')
        .attr('viewBox', `${vbX} ${vbY} ${vbW} ${vbH}`)
        .attr('preserveAspectRatio', 'xMidYMid meet')
        .style('width', '100%')
        .style('height', '100%');

      /* Defs: sombra + clipPaths para esquinas redondeadas en áreas */
      const defs = svg.append('defs');
      const flt = defs.append('filter')
        .attr('id', 'nd-shadow').attr('x','-15%').attr('y','-15%')
        .attr('width','130%').attr('height','130%');
      flt.append('feDropShadow')
        .attr('dx', 0).attr('dy', 1).attr('stdDeviation', 2.5)
        .attr('flood-color', 'rgba(0,0,0,0.16)');

      /* ── Badge: total equipo ── */
      const rootX = root.x;
      const badgeCy = -BADGE_H + 18;
      const badgeG = svg.append('g').attr('filter', 'url(#nd-shadow)');
      badgeG.append('circle')
        .attr('cx', rootX).attr('cy', badgeCy).attr('r', 16)
        .attr('fill', C.dark);
      badgeG.append('text')
        .attr('x', rootX).attr('y', badgeCy + 1)
        .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
        .attr('fill', 'white')
        .attr('font-family', "'Open Sans',Arial,sans-serif")
        .attr('font-size', '10px').attr('font-weight', '800')
        .text(ta.teamTotal);
      svg.append('text')
        .attr('x', rootX).attr('y', badgeCy + 22)
        .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
        .attr('fill', '#aaa')
        .attr('font-family', "'Open Sans',Arial,sans-serif")
        .attr('font-size', '7px').attr('font-weight', '600')
        .attr('letter-spacing', '0.08em')
        .text(ta.teamTotalLabel.toUpperCase());
      /* Línea conectora badge → raíz */
      svg.append('line')
        .attr('x1', rootX).attr('y1', badgeCy + 16)
        .attr('x2', rootX).attr('y2', 0)
        .attr('stroke', '#d0d5e8').attr('stroke-width', 1.5);

      /* ── Conectores — curvas Bézier verticales ── */
      svg.append('g')
        .selectAll('path')
        .data(root.links())
        .join('path')
        .attr('fill', 'none')
        .attr('stroke', '#cbd5e1')
        .attr('stroke-width', 1.5)
        .attr('d', lk => {
          const sx = lk.source.x,  sy = lk.source.y + lk.source.data.nh;
          const tx = lk.target.x,  ty = lk.target.y;
          const my = (sy + ty) / 2;
          return `M${sx},${sy} C${sx},${my} ${tx},${my} ${tx},${ty}`;
        });

      /* ── Nodos ── */
      root.descendants().forEach((d, i) => {
        const isArea = d.depth === 2;
        const nh = d.data.nh;
        const g  = svg.append('g')
          .attr('transform', `translate(${d.x - NW / 2},${d.y})`)
          .attr('filter', 'url(#nd-shadow)');

        if (!isArea) {
          /* Nodos compactos (director, CIO) */
          g.append('rect')
            .attr('width', NW).attr('height', nh).attr('rx', 6)
            .attr('fill', d.data.color);

          g.append('text')
            .attr('x', NW / 2).attr('y', d.data.role ? nh / 2 - 6 : nh / 2)
            .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
            .attr('fill', 'white')
            .attr('font-family', "'Open Sans',Arial,sans-serif")
            .attr('font-size', '9px').attr('font-weight', '700')
            .text(d.data.name);

          if (d.data.role) {
            g.append('text')
              .attr('x', NW / 2).attr('y', nh / 2 + 7)
              .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
              .attr('fill', 'rgba(255,255,255,0.78)')
              .attr('font-family', "'Open Sans',Arial,sans-serif")
              .attr('font-size', '7.5px')
              .text(d.data.role);
          }
        } else {
          /* Contador de personas sobre el nodo de área */
          if (d.data.personCount) {
            g.append('text')
              .attr('x', NW / 2).attr('y', -18)
              .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
              .attr('fill', d.data.color)
              .attr('font-family', "'Open Sans',Arial,sans-serif")
              .attr('font-size', '16px').attr('font-weight', '800')
              .text(d.data.personCount);
            g.append('text')
              .attr('x', NW / 2).attr('y', -5)
              .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
              .attr('fill', '#aaa')
              .attr('font-family', "'Open Sans',Arial,sans-serif")
              .attr('font-size', '6.5px').attr('font-weight', '600')
              .attr('letter-spacing', '0.07em')
              .text(ta.personsLabel);
          }

          /* Nodos de área — encabezado coloreado + lista de personal en blanco */
          const clipId = `clip-area-${i}`;
          defs.append('clipPath').attr('id', clipId)
            .append('rect').attr('width', NW).attr('height', nh).attr('rx', 6);

          const gc = g.append('g').attr('clip-path', `url(#${clipId})`);

          /* Fondo blanco (esquinas redondeadas via clipPath) */
          gc.append('rect').attr('width', NW).attr('height', nh).attr('fill', 'white');

          /* Encabezado coloreado */
          gc.append('rect').attr('width', NW).attr('height', S_HEADER).attr('fill', d.data.color);

          /* Nombre del área */
          gc.append('text')
            .attr('x', NW / 2).attr('y', d.data.role ? S_HEADER / 2 - 5 : S_HEADER / 2)
            .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
            .attr('fill', 'white')
            .attr('font-family', "'Open Sans',Arial,sans-serif")
            .attr('font-size', '9px').attr('font-weight', '700')
            .text(d.data.name);

          if (d.data.role) {
            gc.append('text')
              .attr('x', NW / 2).attr('y', S_HEADER / 2 + 5)
              .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
              .attr('fill', 'rgba(255,255,255,0.82)')
              .attr('font-family', "'Open Sans',Arial,sans-serif")
              .attr('font-size', '7px')
              .text(d.data.role);
          }

          /* Línea separadora */
          gc.append('line')
            .attr('x1', 0).attr('y1', S_HEADER)
            .attr('x2', NW).attr('y2', S_HEADER)
            .attr('stroke', '#e2e8f0').attr('stroke-width', 1);

          /* Ítems de personal */
          d.data.staff.forEach((item, si) => {
            const iy = S_HEADER + S_PAD + si * S_ITEM + S_ITEM / 2;

            gc.append('circle')
              .attr('cx', 10).attr('cy', iy).attr('r', 3.5).attr('fill', item.color);

            gc.append('text')
              .attr('x', 19).attr('y', iy)
              .attr('dominant-baseline', 'middle')
              .attr('fill', '#374151')
              .attr('font-family', "'Open Sans',Arial,sans-serif")
              .attr('font-size', '8px')
              .text(item.name);

            if (item.count) {
              gc.append('circle')
                .attr('cx', NW - 10).attr('cy', iy).attr('r', 7)
                .attr('fill', C.sky).attr('stroke', 'white').attr('stroke-width', 1.5);
              gc.append('text')
                .attr('x', NW - 10).attr('y', iy + 0.5)
                .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
                .attr('fill', 'white')
                .attr('font-family', "'Open Sans',Arial,sans-serif")
                .attr('font-size', '7px').attr('font-weight', '700')
                .text(item.count);
            }
          });
        }
      });
    }

    /* ── SEGMENTO 1 — Quiénes somos + Qué hacemos ────────────── */
    function SegAbout({ t }) {
      const ta = t.about;
      const tw = t.whatWeDo;
      const chartRef = useRef(null);

      useEffect(() => {
        if (chartRef.current) renderOrgChart(chartRef.current, ta);
      }, [t]);

      const AreaCard = ({ title, text, accent }) => (
        <div style={{
          flex: 1,
          display: 'flex',
          flexDirection: 'column',
          background: 'white',
          borderRadius: 10,
          overflow: 'hidden',
          boxShadow: '0 2px 12px rgba(0,0,0,0.08)',
        }}>
          <div style={{ height: 4, background: accent, flexShrink: 0 }} />
          <div style={{ padding: '0.8rem 1.2rem 1rem', display: 'flex', flexDirection: 'column', flex: 1 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', marginBottom: '0.6rem' }}>
              <div style={{ width: 8, height: 8, borderRadius: '50%', background: accent, flexShrink: 0 }} />
              <h3 style={{
                color: C.dark,
                fontSize: 'clamp(0.8rem, 1.4vw, 1rem)',
                fontWeight: 700,
                fontFamily: 'Arial, sans-serif',
                margin: 0,
              }}>
                {title}
              </h3>
            </div>
            <p style={{
              color: '#374151',
              fontSize: 'clamp(0.68rem, 1.1vw, 0.82rem)',
              lineHeight: 1.6,
              margin: 0,
              flex: 1,
            }}>
              {text}
            </p>
          </div>
        </div>
      );

      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>

          {/* Cuerpo — dos mitades */}
          <div style={{ flex: 1, minHeight: 0, display: 'flex' }}>

            {/* Mitad izquierda — organigrama top-down */}
            <div
              ref={chartRef}
              style={{ flex: '0 0 50%', minWidth: 0, padding: '0.5rem 1rem 0.5rem 1.5rem', overflow: 'hidden' }}
            />

            {/* Separador vertical */}
            <div style={{ width: 1, background: '#e5e7eb', flexShrink: 0, margin: '0.25rem 0 0.5rem' }} />

            {/* Mitad derecha — qué hacemos */}
            <div style={{
              flex: 1,
              display: 'flex',
              flexDirection: 'column',
              gap: '0.8rem',
              padding: '0.8rem 1.5rem',
              justifyContent: 'center',
            }}>
              <AreaCard title={tw.digitTitle} text={tw.digitText} accent={C.sky} />
              <AreaCard title={tw.infraTitle} text={tw.infraText} accent={C.purple} />
            </div>

          </div>

          {/* Pie — frase */}
          <div style={{
            padding: '0.5rem 1.75rem 0.6rem',
            flexShrink: 0,
            borderTop: '1px solid #e5e7eb',
          }}>
            {ta.quote && <p style={{
              color: C.dark,
              fontSize: 'clamp(0.72rem, 1.2vw, 0.9rem)',
              fontWeight: 600,
              fontFamily: 'Arial, sans-serif',
              fontStyle: 'italic',
              lineHeight: 1.5,
              margin: 0,
              textAlign: 'center',
            }}>
              "{ta.quote}"
            </p>}
          </div>
        </div>
      );
    }

    /* ── SEGMENTO 3 — Método de trabajo ───────────────────── */
    function SegMethod({ t }) {
      const tm = t.method;
      const wf = tm.workflow || [];

      /* Colores del diseño resumen_metodologia */
      const M = {
        blue:   '#283897',
        orange: '#d4652a',
        purple: '#6B3FA0',
        teal:   '#1a7a80',
        green:  '#1e8a4a',
        red:    '#cc2200',
        dark:   '#2A295C',
      };
      const stepColors = [M.blue, M.orange, M.purple, M.teal];

      /* SVG icons for workflow steps */
      const STEP_ICONS = [
        <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ width: '55%', height: '55%' }}>
          <rect x="2" y="7" width="20" height="14" rx="2" /><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" /><path d="M2 13h20" />
        </svg>,
        <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ width: '55%', height: '55%' }}>
          <polygon points="12 2 2 7 22 7" /><rect x="4" y="10" width="2" height="8" /><rect x="9" y="10" width="2" height="8" /><rect x="14" y="10" width="2" height="8" /><rect x="19" y="10" width="2" height="8" /><rect x="2" y="19" width="20" height="2" />
        </svg>,
        <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ width: '55%', height: '55%' }}>
          <circle cx="12" cy="12" r="10" /><path d="M2 12h20" /><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
        </svg>,
        <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ width: '55%', height: '55%' }}>
          <circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>,

    /* ── Renderizador del gráfico de trayectoria (D3) ──────── */
    function renderTrajectoryChart(container, tt) {
      const data = tt.chartData;
      const W = container.clientWidth;
      const H = container.clientHeight;
      if (!W || !H) return;

      const margin = { top: 12, right: 56, bottom: 36, left: 44 };
      const w = W - margin.left - margin.right;
      const h = H - margin.top - margin.bottom;

      d3.select(container).selectAll('svg').remove();

      const svg = d3.select(container)
        .append('svg').attr('width', W).attr('height', H);

      const g = svg.append('g')
        .attr('transform', `translate(${margin.left},${margin.top})`);

      /* Escalas */
      const x = d3.scaleBand()
        .domain(data.map(d => d.year))
        .range([0, w]).padding(0.35);

      const maxP = d3.max(data, d => d.projects);
      const yL = d3.scaleLinear()
        .domain([0, Math.ceil(maxP / 10) * 10 + 15]).nice()
        .range([h, 0]);

      const maxC = d3.max(data, d => d.cumulative);
      const yR = d3.scaleLinear()
        .domain([0, Math.ceil(maxC / 25) * 25]).nice()
        .range([h, 0]);

      /* Líneas de cuadrícula horizontales */
      g.selectAll('line.hgrid')
        .data(yL.ticks(6))
        .join('line')
        .attr('x1', 0).attr('x2', w)
        .attr('y1', d => yL(d)).attr('y2', d => yL(d))
        .attr('stroke', '#E5E7EB')
        .attr('stroke-dasharray', '3,3');

      /* Área de relleno rosa bajo la línea acumulada */
      const areaGen = d3.area()
        .x(d => x(d.year) + x.bandwidth() / 2)
        .y0(h)
        .y1(d => yR(d.cumulative))
        .curve(d3.curveCatmullRom.alpha(0.5));

      g.append('path')
        .datum(data)
        .attr('fill', 'rgba(238,0,0,0.06)')
        .attr('d', areaGen);

      /* Barras sólidas azules con tope redondeado */
      const rx = 4;
      data.forEach(d => {
        const bx = x(d.year), bw = x.bandwidth();
        const by = yL(d.projects);
        g.append('path')
          .attr('d', `M${bx},${h} L${bx},${by+rx} Q${bx},${by} ${bx+rx},${by} L${bx+bw-rx},${by} Q${bx+bw},${by} ${bx+bw},${by+rx} L${bx+bw},${h} Z`)
          .attr('fill', '#283897');

        /* Etiqueta de valor DENTRO de la barra (blanco, bold) */
        g.append('text')
          .attr('x', bx + bw / 2).attr('y', by + (h - by) / 2 + 5)
          .attr('text-anchor', 'middle')
          .attr('fill', 'white')
          .attr('font-family', "'Open Sans',Arial,sans-serif")
          .attr('font-size', '14px').attr('font-weight', '700')
          .text(d.projects);
      });

      /* Eje izquierdo */
      g.append('g')
        .call(d3.axisLeft(yL).ticks(6).tickSize(0))
        .call(ag => {
          ag.select('.domain').attr('stroke', '#D1D5DB');
          ag.selectAll('text').attr('fill','#6B7280')
            .attr('font-family',"'Open Sans',Arial,sans-serif")
            .attr('font-size','11px').attr('dx','-4px');
        });

      /* Eje derecho (rojo) */
      g.append('g')
        .attr('transform', `translate(${w},0)`)
        .call(d3.axisRight(yR).ticks(5).tickSize(0))
        .call(ag => {
          ag.select('.domain').attr('stroke','rgba(238,0,0,0.25)');
          ag.selectAll('text').attr('fill','rgba(238,0,0,0.7)')
            .attr('font-family',"'Open Sans',Arial,sans-serif")
            .attr('font-size','11px').attr('dx','4px');
        });

      /* Eje X */
      g.append('g')
        .attr('transform', `translate(0,${h})`)
        .call(d3.axisBottom(x).tickSize(0))
        .call(ag => {
          ag.select('.domain').attr('stroke','#D1D5DB');
          ag.selectAll('text').attr('fill','#2A295C')
            .attr('font-family',"'Open Sans',Arial,sans-serif")
            .attr('font-size','13px').attr('font-weight','600')
            .attr('dy','1.1em');
        });

      /* Línea de acumulado histórico (roja) */
      const lineGen = d3.line()
        .x(d => x(d.year) + x.bandwidth() / 2)
        .y(d => yR(d.cumulative))
        .curve(d3.curveCatmullRom.alpha(0.5));

      g.append('path')
        .datum(data)
        .attr('fill','none')
        .attr('stroke','#EE0000')
        .attr('stroke-width', 2.5)
        .attr('d', lineGen);

      /* Puntos y etiquetas de la línea */
      data.forEach(d => {
        const cx = x(d.year) + x.bandwidth() / 2;
        const cy = yR(d.cumulative);

        g.append('circle')
          .attr('cx', cx).attr('cy', cy).attr('r', 5)
          .attr('fill','white')
          .attr('stroke','#EE0000').attr('stroke-width', 2.5);

        g.append('text')
          .attr('x', cx + 10).attr('y', cy - 8)
          .attr('fill','#EE0000')
          .attr('font-family',"'Open Sans',Arial,sans-serif")
          .attr('font-size','12px').attr('font-weight','700')
          .text(d.cumulative);
      });
    }

    function SegTrajectory({ t }) {
      const tt = t.trajectory;

    /* ── Renderizador de Carta Gantt (D3) ───────────────────── */
    /* Alturas compartidas tabla ↔ Gantt */
    const GANTT_TIMELINE_H = 48; /* px — espacio para año/mes sobre las barras */

    function renderGanttChart(container, tcp, subRowH) {
      const parse = d3.timeParse('%Y-%m-%d');

      /* Build flat list of visual rows (one per phase-line) */
      const visualRows = [];
      tcp.projects.forEach(p => {
        const rows = p.phases || [[]];
        rows.forEach(phaseLine => {
          visualRows.push(phaseLine.map(ph => ({
            label: ph.label,
            start: parse(ph.start),
            end:   parse(ph.end),
            color: ph.color,
          })));
        });
      });

      const W = container.clientWidth;
      const H = container.clientHeight;
      if (!W || !H) return;

      const chartH   = subRowH * visualRows.length;
      const margin   = { top: GANTT_TIMELINE_H, right: 24, bottom: 0, left: 8 };
      const totalH   = margin.top + chartH + margin.bottom;
      const w        = W - margin.left - margin.right;

      d3.select(container).selectAll('svg').remove();

      const svgH = Math.max(totalH, H);
      const svg = d3.select(container)
        .append('svg')
        .attr('width', W)
        .attr('height', svgH)
        .style('display', 'block');

      const xMin = new Date(2024, 5, 1);   /* 1 Jun 2024  */
      const xMax = new Date(2026, 11, 1);  /* 1 Dic 2026  */

      const x = d3.scaleTime().domain([xMin, xMax]).range([0, w]);

      const barPad = 0.45;
      const barH   = subRowH * (1 - barPad);

      const today = new Date();

      /* ── Capa 1: Fondos alternados por proyecto ── */
      const bgLayer = svg.append('g');
      let vIdx = 0;
      tcp.projects.forEach((p, pi) => {
        const nRows = (p.phases || [[]]).length;
        const yTop = margin.top + vIdx * subRowH;
        bgLayer.append('rect')
          .attr('x', 0).attr('y', yTop)
          .attr('width', W).attr('height', subRowH * nRows)
          .attr('fill', pi % 2 === 0 ? '#F9FAFB' : '#FFFFFF');
        if (pi > 0) {
          bgLayer.append('line')
            .attr('x1', 0).attr('x2', W)
            .attr('y1', yTop).attr('y2', yTop)
            .attr('stroke', '#E5E7EB').attr('stroke-width', 0.5);
        }
        vIdx += nRows;
      });

      /* ── Capa 2: Cuadrícula y ejes ── */
      const g = svg.append('g')
        .attr('transform', `translate(${margin.left},${margin.top})`);

      d3.timeMonth.range(xMin, xMax).forEach(dt => {
        const isJan = dt.getMonth() === 0;
        g.append('line')
          .attr('x1', x(dt)).attr('x2', x(dt))
          .attr('y1', isJan ? -margin.top : -28)
          .attr('y2', chartH)
          .attr('stroke', isJan ? '#A0AEC0' : '#E2E8F0')
          .attr('stroke-width', isJan ? 1.2 : 0.5);
      });

      /* Meses abreviados cada 3 meses */
      d3.timeMonth.every(3).range(xMin, xMax).forEach(dt => {
        const isJan = dt.getMonth() === 0;
        g.append('text')
          .attr('x', isJan ? x(dt) + 5 : x(dt))
          .attr('y', isJan ? -margin.top + 18 : -12)
          .attr('text-anchor', isJan ? 'start' : 'middle')
          .attr('fill', isJan ? C.dark : '#4A5568')
          .attr('font-family', "'Open Sans',Arial,sans-serif")
          .attr('font-size', isJan ? '14px' : '11px')
          .attr('font-weight', isJan ? '700' : '500')
          .text(isJan ? d3.timeFormat('%Y')(dt) : d3.timeFormat('%b')(dt));
      });

      /* Marcador de hoy */
      if (today >= xMin && today <= xMax) {
        g.append('line')
          .attr('x1', x(today)).attr('x2', x(today))
          .attr('y1', -margin.top + 2).attr('y2', chartH)
          .attr('stroke', C.red).attr('stroke-width', 2);
      }

      /* ── Capa 3: Barras por fases ── */
      const barLayer = svg.append('g')
        .attr('transform', `translate(${margin.left},${margin.top})`);

      visualRows.forEach((phases, vi) => {
        phases.forEach(ph => {
          const bx = x(ph.start);
          const bw = Math.max(x(ph.end) - x(ph.start), 8);
          const by = vi * subRowH + (subRowH - barH) / 2;
          const rc = 5;

          barLayer.append('rect')
            .attr('x', bx).attr('y', by)
            .attr('width', bw).attr('height', barH)
            .attr('fill', ph.color)
            .attr('rx', rc).attr('ry', rc);

          /* Label inside bar (supports \n for two lines) */
          if (bw > 50) {
            const lines = ph.label.split('\n');
            const longest = lines.reduce((a, b) => a.length > b.length ? a : b, '');
            const fontSize = Math.min(11, Math.max(7, bw / longest.length * 1.2));
            const lineH = fontSize * 1.25;
            const textY = by + barH / 2 - (lines.length - 1) * lineH / 2 + fontSize * 0.35;

            lines.forEach((line, li) => {
              const displayLine = bw < 90 ? line.substring(0, Math.floor(bw / 6)) + '...' : line;
              barLayer.append('text')
                .attr('x', bx + bw / 2).attr('y', textY + li * lineH)
                .attr('text-anchor', 'middle')
                .attr('fill', '#FFFFFF')
                .attr('font-family', "'Open Sans',Arial,sans-serif")
                .attr('font-size', fontSize + 'px').attr('font-weight', '700')
                .text(displayLine);
            });
          }
        });
      });
    }

    /* ── SEGMENTO 7 — Proyectos actuales ────────────────────── */
    function SegCurrentProjects({ t }) {
      const tcp      = t.currentProjects;
      const chartRef  = useRef(null);
      const wrapRef   = useRef(null);
      const [subRowH, setSubRowH] = useState(0);

      /* Total de filas visuales (sumando rows de cada proyecto) */
      const totalVisualRows = tcp.projects.reduce((s, p) => s + (p.phases || [[]]).length, 0);

      /* Calcular subRowH a partir del espacio disponible */
      useEffect(() => {
        if (wrapRef.current) {
          const available = wrapRef.current.clientHeight - GANTT_TIMELINE_H - 30;
          setSubRowH(Math.max(Math.floor(available / totalVisualRows), 32));
        }
      }, [t]);

      useEffect(() => {
        if (chartRef.current && subRowH > 0) renderGanttChart(chartRef.current, tcp, subRowH);

                        <span style={{ color: '#374151', fontSize: 'clamp(0.55rem, 0.85vw, 0.72rem)', fontWeight: 400 }}>{p.name}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Separador vertical */}
            <div style={{ width: 1, background: '#E2E8F0', flexShrink: 0 }} />

            {/* Derecha — Carta Gantt */}
            <div ref={chartRef} style={{ flex: 1, minHeight: 0, overflow: 'hidden' }} />

          {/* Footnote */}
          {tcp.footnote && (

    /* ── SEGMENTO 11 — Transición GBS | Ticket Status ──────── */
    function SegTicketStatus({ t }) {
      const tt = t.ticketStatus;

      const thStyle = {
        padding: '0.45rem 0.5rem', textAlign: 'center', color: 'white',
        fontFamily: 'Arial,sans-serif', fontWeight: 700,
        fontSize: 'clamp(0.5rem, 0.8vw, 0.65rem)', whiteSpace: 'nowrap',
      };
      const tdStyle = {
        padding: '0.35rem 0.5rem', textAlign: 'center',
        fontSize: 'clamp(0.5rem, 0.8vw, 0.65rem)', color: C.dark,
      };
      const tdLabelStyle = {
        ...tdStyle, textAlign: 'left', fontWeight: 700, fontSize: 'clamp(0.48rem, 0.75vw, 0.62rem)',
      };

      const months = tt.months;
      const rows = tt.rows;
      const pctRows = tt.pctRows;

      /* 100% stacked bar chart */
      const BarChart = () => {
        return (
          <div style={{ display: 'flex', gap: '0.35rem', height: '100%', padding: '0.3rem 0' }}>
            {tt.chartData.map((d, i) => {
              const total = d.tcs + d.local;
              const tcsPct = (d.tcs / total) * 100;
              const localPct = (d.local / total) * 100;
              return (
                <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', height: '100%' }}>
                  <div style={{ flex: 1, display: 'flex', flexDirection: 'column', borderRadius: 4, overflow: 'hidden' }}>
                    <div style={{ height: `${localPct}%`, background: C.orange, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                      <span style={{ color: 'white', fontSize: 'clamp(0.4rem, 0.65vw, 0.52rem)', fontWeight: 700 }}>{d.local}</span>
                    </div>
                    <div style={{ height: `${tcsPct}%`, background: C.blue, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                      <span style={{ color: 'white', fontSize: 'clamp(0.4rem, 0.65vw, 0.52rem)', fontWeight: 700 }}>{d.tcs}</span>
                    </div>
                  </div>
                  <div style={{ fontSize: 'clamp(0.38rem, 0.55vw, 0.45rem)', color: '#6B7280', marginTop: 3, textAlign: 'center' }}>{d.month}</div>
                </div>
              );
            })}
          </div>
        );
      };

      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', overflow: 'hidden', background: '#F8FAFC', padding: '0.6rem 1.5rem' }}>
          {/* Top section: table + chart */}
          <div style={{ display: 'flex', gap: '1rem', flex: 1, minHeight: 0 }}>
            {/* Tables */}
            <div style={{ flex: 3, display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
              {/* Absolute values table */}
              <div style={{ background: 'white', borderRadius: 8, overflow: 'hidden', boxShadow: '0 1px 6px rgba(0,0,0,0.06)' }}>
                <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                  <thead>
                    <tr style={{ background: C.blue }}>
                      <th style={{ ...thStyle, textAlign: 'left', borderRadius: '8px 0 0 0' }}></th>
                      {months.map((m, i) => <th key={i} style={{ ...thStyle, borderRadius: i === months.length - 1 ? '0 8px 0 0' : 0 }}>{m}</th>)}
                    </tr>
                  </thead>
                  <tbody>
                    {rows.map((row, ri) => (
                      <tr key={ri} style={{ background: ri % 2 === 0 ? '#F8FAFC' : 'white', fontWeight: row.bold ? 700 : 400 }}>
                        <td style={{ ...tdLabelStyle, color: row.color || C.dark }}>{row.label}</td>
                        {row.values.map((v, vi) => <td key={vi} style={{ ...tdStyle, fontWeight: row.bold ? 700 : 400 }}>{v}</td>)}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              {/* Percentage table */}
              <div style={{ background: 'white', borderRadius: 8, overflow: 'hidden', boxShadow: '0 1px 6px rgba(0,0,0,0.06)' }}>
                <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                  <thead>
                    <tr style={{ background: C.blue }}>
                      <th style={{ ...thStyle, textAlign: 'left', borderRadius: '8px 0 0 0' }}></th>
                      {months.map((m, i) => <th key={i} style={{ ...thStyle, borderRadius: i === months.length - 1 ? '0 8px 0 0' : 0 }}>{m}</th>)}
                    </tr>
                  </thead>
                  <tbody>
                    {pctRows.map((row, ri) => (
                      <tr key={ri} style={{ background: ri % 2 === 0 ? '#F8FAFC' : 'white' }}>
                        <td style={{ ...tdLabelStyle, color: row.color || C.dark }}>{row.label}</td>
                        {row.values.map((v, vi) => <td key={vi} style={tdStyle}>{v}</td>)}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
            {/* Chart */}
            <div style={{ flex: 2, background: 'white', borderRadius: 10, boxShadow: '0 1px 6px rgba(0,0,0,0.06)', padding: '0.6rem 0.8rem', display: 'flex', flexDirection: 'column' }}>
              <div style={{ color: C.dark, fontSize: 'clamp(0.55rem, 0.85vw, 0.7rem)', fontWeight: 700, fontFamily: 'Arial,sans-serif', marginBottom: '0.3rem' }}>{tt.chartTitle}</div>
              <div style={{ flex: 1, minHeight: 0 }}>
                <BarChart />
              </div>
              <div style={{ display: 'flex', gap: '0.8rem', justifyContent: 'center', marginTop: '0.3rem' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                  <div style={{ width: 10, height: 10, background: C.blue, borderRadius: 2 }} />
                  <span style={{ fontSize: 'clamp(0.4rem, 0.6vw, 0.5rem)', color: '#6B7280' }}>{tt.legendTCS}</span>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                  <div style={{ width: 10, height: 10, background: C.orange, borderRadius: 2 }} />
                  <span style={{ fontSize: 'clamp(0.4rem, 0.6vw, 0.5rem)', color: '#6B7280' }}>{tt.legendLocal}</span>
                </div>
              </div>
            </div>
          </div>
          {/* Key Highlights */}
          <div style={{ marginTop: '0.5rem', background: '#F0F4F8', borderRadius: 10, border: '1px solid #D1D5DB', padding: '0.6rem 1.2rem' }}>
            <h4 style={{ color: C.dark, fontSize: 'clamp(0.7rem, 1.1vw, 0.85rem)', fontWeight: 700, fontFamily: 'Arial,sans-serif', margin: '0 0 0.3rem', fontStyle: 'italic' }}>{tt.highlightsTitle}</h4>
            {tt.highlights.map((h, i) => (
              <div key={i} style={{ display: 'flex', alignItems: 'flex-start', gap: 6, marginBottom: '0.2rem' }}>
                <span style={{ color: C.green, fontSize: '0.7rem', marginTop: 2, flexShrink: 0 }}>➤</span>
                <span style={{ color: '#374151', fontSize: 'clamp(0.52rem, 0.85vw, 0.7rem)', lineHeight: 1.5 }}>{h}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ── SEGMENTO 12 — Security Baseline Status [MSB] ─────── */
    function SegSecurityBaseline({ t }) {
      const ts = t.securityBaseline;

      const thStyle = {
        padding: '0.6rem 1rem', textAlign: 'left', color: 'white',
        fontFamily: 'Arial,sans-serif', fontWeight: 700,
        fontSize: 'clamp(0.6rem, 0.95vw, 0.78rem)', letterSpacing: '0.04em',

      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', overflow: 'hidden', background: '#F8FAFC', padding: '0.8rem 1.5rem' }}>

            {/* Left: Security controls table */}
            <div style={{ flex: 1, background: 'white', borderRadius: 10, overflow: 'hidden', boxShadow: '0 2px 12px rgba(0,0,0,0.08)', display: 'flex', flexDirection: 'column' }}>
              <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                <thead>
                  <tr style={{ background: C.dark }}>
                    <th style={{ ...thStyle, borderRadius: '10px 0 0 0' }}>{ts.colControl}</th>

                  </tr>
                </thead>
                <tbody>
                  {ts.controls.map((c, i) => {
                    const pct = parseInt(c.progress);
                    const barColor = pct >= 85 ? C.green : pct >= 70 ? C.sky : pct >= 50 ? C.orange : C.red;
                    return (
                      <tr key={i} style={{ background: i % 2 === 0 ? 'white' : '#F8FAFC' }}>
                        <td style={{ padding: '0.5rem 1rem', color: C.dark, fontWeight: 700, fontSize: 'clamp(0.52rem, 0.85vw, 0.7rem)' }}>{c.name}</td>
                        <td style={{ padding: '0.5rem 1rem', textAlign: 'center' }}>
                          <div style={{ display: 'flex', alignItems: 'center', gap: '0.4rem' }}>
                            <div style={{ flex: 1, height: 8, background: '#E5E7EB', borderRadius: 4, overflow: 'hidden' }}>
                              <div style={{ width: c.progress, height: '100%', background: barColor, borderRadius: 4, transition: 'width 0.6s' }} />
                            </div>
                            <span style={{ fontSize: 'clamp(0.5rem, 0.8vw, 0.65rem)', fontWeight: 700, color: barColor, minWidth: '2rem' }}>{c.progress}</span>
                          </div>
                        </td>
                        <td style={{ padding: '0.5rem 1rem', color: '#6B7280', fontSize: 'clamp(0.5rem, 0.8vw, 0.65rem)' }}>{c.owner}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            {/* Right: Priority action plan */}

              <h4 style={{ color: 'white', fontSize: 'clamp(0.85rem, 1.4vw, 1.1rem)', fontWeight: 700, fontFamily: 'Arial,sans-serif', margin: '0 0 0.6rem' }}>{ts.actionPlanTitle}</h4>
              <div style={{ display: 'flex', flexDirection: 'column', gap: '0.6rem', flex: 1 }}>
                {ts.actionItems.map((item, i) => (
                  <div key={i} style={{ background: 'rgba(255,255,255,0.15)', borderRadius: 8, padding: '0.6rem 0.8rem' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: '0.2rem' }}>
                      <span style={{ color: '#FBBF24', fontSize: '0.7rem' }}>➤</span>
                      <span style={{ color: 'white', fontWeight: 700, fontSize: 'clamp(0.62rem, 1vw, 0.82rem)', fontFamily: 'Arial,sans-serif' }}>{item.title}</span>
                    </div>
                    <p style={{ color: 'rgba(255,255,255,0.85)', fontSize: 'clamp(0.5rem, 0.8vw, 0.68rem)', lineHeight: 1.6, margin: 0 }}>{item.text}</p>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

      const tagStyle = (bg) => ({

                  {legend.map((l, i) => (

                    </div>

              </>

              <div style={{ textAlign: 'center', fontSize: 'clamp(1rem, 1.8vw, 1.4rem)', color: C.blue }}>⬇</div>
              {/* Asegurando */}
              <div style={{ background: 'white', borderRadius: 10, boxShadow: '0 2px 12px rgba(0,0,0,0.08)', padding: '0.7rem 1rem', border: '1px solid #E5E7EB' }}>
                <div style={tagStyle(C.dark)}>{ti.ensuringTag}</div>
                <ul style={{ margin: '0.4rem 0 0', paddingLeft: '1.2rem', listStyle: 'disc', color: '#374151' }}>
                  {(ti.ensuringItems || []).map((item, i) => (
                    <li key={i} style={{ fontSize: 'clamp(0.52rem, 0.85vw, 0.72rem)', lineHeight: 1.7 }}>{item}</li>
                  ))}
                </ul>
              </div>
            </div>
          </div>

          {/* ── Separador con etiqueta ── */}
          <div style={{ padding: '0.3rem 1.5rem 0.2rem', flexShrink: 0 }}>
            <div style={{
              color: '#9CA3AF', fontSize: 'clamp(0.48rem, 0.75vw, 0.62rem)', fontWeight: 700,
              letterSpacing: '0.14em', textTransform: 'uppercase',
            }}>{ti.evidenceLabel}</div>
          </div>

          {/* ── Mitad inferior: Casos reales (3 columnas) ── */}
          <div style={{ flex: 1, minHeight: 0, display: 'flex', gap: '0.8rem', padding: '0 1.5rem 0.6rem' }}>
            <CaseCard tag={ti.case1Tag} title={ti.case1Title} subtitle={ti.case1Subtitle}
              months={ti.case1Months} monthsLabel={ti.case1MonthsLabel}
              text={ti.case1Text} bar={ti.case1Bar} legend={ti.case1Legend} />
            <CaseCard tag={ti.case2Tag} title={ti.case2Title} subtitle={ti.case2Subtitle}
              badges={ti.case2Badges} months={ti.case2Months} monthsLabel={ti.case2MonthsLabel}
              text={ti.case2Text} bar={ti.case2Bar} legend={ti.case2Legend} />
            <CaseCard tag={ti.case3Tag} title={ti.case3Title} subtitle={ti.case3Subtitle}
              badges={ti.case3Badges}
              text={ti.case3Text} />
          </div>
        </div>
      );
    }

    /* ── SEGMENTO 10 — Stack Tecnológico ────────────────────── */


    /* ── Configuración de segmentos ─────────────────────────── */
    const SEGMENTS_CONFIG = [
      { id: 0,  Component: SegHome            },
      { id: 1,  Component: SegAbout           },
      { id: 2,  Component: SegMethod          },
     
      { id: 3,  Component: SegMetrics         },
      { id: 5,  Component: SegPortfolio       },
      { id: 6,  Component: SegCurrentProjects },
      { id: 7,  Component: SegRegionalReach   },
      { id: 8,  Component: SegGlobalPlatforms },
      { id: 9,  Component: SegGBSTransition   },
      { id: 10, Component: SegTicketStatus    },
      { id: 11, Component: SegSecurityBaseline },
      { id: 12, Component: SegImprovements    },
    ];

    /* ════════════════════════════════════════════════════════
       Componente principal — App
       ════════════════════════════════════════════════════════ */
    function App({ locales }) {
      const [lang,       setLang]       = useState('es');
      const [displayIdx, setDisplayIdx] = useState(() => {
        const m = window.location.hash.match(/^#slide-(\d+)$/);
        if (m) { const idx = parseInt(m[1], 10); if (idx >= 0 && idx < SEGMENTS_CONFIG.length) return idx; }
        return 0;
      });
      const [animClass,  setAnimClass]  = useState('');
      const [animating,  setAnimating]  = useState(false);
      const [menuOpen,   setMenuOpen]   = useState(true);
      const [printMode,  setPrintMode]  = useState(false);
      const menuRef = useRef(null);

      const t        = locales[lang];
      const SEGMENTS = SEGMENTS_CONFIG.map((s, i) => ({ ...s, title: t.segments[i] }));

      /* ── Sincronizar lang con el documento ──────────────── */
      useEffect(() => {
        document.title = t.pageTitle;
        document.documentElement.lang = lang;
      }, [lang]);

      /* ── Alternar idioma ────────────────────────────────── */
      const toggleLang = () => setLang(l => l === 'es' ? 'en' : 'es');

      /* ── Exportar a PDF ─────────────────────────────────── */
      const handlePrint = () => {
        /* Forzar overflow visible en toda la cadena DOM */
        document.documentElement.style.height = 'auto';
        document.documentElement.style.overflow = 'visible';
        document.body.style.height = 'auto';
        document.body.style.overflow = 'visible';
        document.documentElement.classList.add('print-mode');
        setPrintMode(true);
        setTimeout(() => {
          window.print();
        }, 1500);
      };

      const restorePrintMode = () => {
        document.documentElement.classList.remove('print-mode');
        document.documentElement.style.height = '';
        document.documentElement.style.overflow = '';
        document.body.style.height = '';
        document.body.style.overflow = '';
        setPrintMode(false);
      };

      /* ── Navegar a una diapositiva ──────────────────────── */
      const goTo = (idx) => {
        if (idx === displayIdx || animating || idx < 0 || idx >= SEGMENTS.length) return;

        const dir = idx > displayIdx ? 'next' : 'prev';
        setAnimating(true);

        /* 1. Animar salida del slide actual */
        setAnimClass(`slide-exit-${dir}`);

        setTimeout(() => {
          /* 2. Cambiar contenido y animar entrada */
          setDisplayIdx(idx);
          setAnimClass(`slide-enter-${dir}`);

          setTimeout(() => {
            /* 3. Limpiar clases */
            setAnimClass('');
            setAnimating(false);
          }, 400);
        }, 300);
      };

      /* ── Navegación por teclado ─────────────────────────── */
      useEffect(() => {
        const onKey = (e) => {
          if (['ArrowRight', 'ArrowDown', ' '].includes(e.key)) {
            e.preventDefault();
            goTo(displayIdx + 1);
          }
          if (['ArrowLeft', 'ArrowUp'].includes(e.key)) {
            e.preventDefault();
            goTo(displayIdx - 1);
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [displayIdx, animating]);

      /* ── Restaurar tras imprimir ─────────────────────── */
      useEffect(() => {
        window.addEventListener('afterprint', restorePrintMode);
        return () => window.removeEventListener('afterprint', restorePrintMode);
      }, []);

      /* ── Cerrar menú al hacer clic fuera ────────────────── */
      useEffect(() => {
        const onMouseDown = (e) => {
          if (menuRef.current && !menuRef.current.contains(e.target)) {
            setMenuOpen(false);
          }
        };
        document.addEventListener('mousedown', onMouseDown);
        return () => document.removeEventListener('mousedown', onMouseDown);
      }, []);

      const { Component: CurrentSlide } = SEGMENTS[displayIdx];

      /* ── Render ─────────────────────────────────────────── */
      return (
        <div className={printMode ? 'print-mode' : ''} style={printMode ? {} : { height: '100vh', overflow: 'hidden' }}>

        {/* ═══ Vista de impresión (todas las slides) ════════ */}
        {printMode && (
          <div className="print-view">
            {SEGMENTS.map((seg, i) => {
              const SlideComp = seg.Component;
              return (
                <div key={i} className="print-slide">
                  <div className="print-slide-header">
                    <h1 className="brand-title" style={{ color: C.blue, fontSize: '1.15rem', fontWeight: 700, fontFamily: 'Arial,sans-serif', margin: 0 }}>
                      {seg.title}
                    </h1>
                    <span style={{ color: C.dark, fontSize: '0.82rem' }}>{i + 1} / {SEGMENTS.length}</span>
                  </div>
                  <div className="print-slide-body">
                    <SlideComp t={t} />
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ═══ Vista normal ════════════════════════════════ */}
        <div className="app-main" style={{ display: 'flex', height: '100%', overflow: 'hidden', background: '#fff' }}>

          {/* ════ MENÚ LATERAL ══════════════════════════════ */}
          <div
            ref={menuRef}
            className="sidebar"
            style={{ width: menuOpen ? 220 : 8 }}
            aria-label={t.ariaOpenMenu}
          >
            {/* Borde rojo (menú oculto) */}
            {!menuOpen && (
              <div
                className="sidebar-collapsed-bar"
                onClick={() => setMenuOpen(true)}
                role="button"
                tabIndex={0}
                aria-label={t.ariaOpenMenu}
                onKeyDown={e => e.key === 'Enter' && setMenuOpen(true)}
              />
            )}

            {/* Contenido del menú */}
            <div
              className="sidebar-inner"
              style={{ opacity: menuOpen ? 1 : 0, pointerEvents: menuOpen ? 'auto' : 'none' }}
            >
              {/* Cabecera del menú */}
              <div style={{ borderBottom: '1px solid rgba(255,255,255,0.18)', paddingBottom: '0.4rem', marginBottom: '0.35rem' }}>
                <div style={{
                  background: 'white', borderRadius: 5, padding: '3px 7px',
                  display: 'inline-flex', alignItems: 'center',
                  borderTop: `2px solid ${C.red}`,
                  marginBottom: '0.3rem',
                }}>
                  <img
                    src="assets/logo.png"
                    alt="Sodexo"
                    style={{ height: 22, width: 'auto', display: 'block' }}
                  />
                </div>
                <div style={{ color: 'white', fontWeight: 600, fontSize: '0.64rem' }}>{t.sidebarTitle}</div>
                <div style={{ color: 'rgba(255,255,255,0.55)', fontSize: '0.56rem' }}>{t.sidebarSubtitle}</div>
              </div>

              {/* Navegación por segmentos */}
              <nav style={{ flex: 1 }}>
                {SEGMENTS.map((seg, i) => (
                  <button
                    key={seg.id}
                    onClick={() => { goTo(i); }}
                    className={`nav-btn ${displayIdx === i ? 'active' : ''}`}
                    aria-current={displayIdx === i ? 'page' : undefined}
                  >
                    <span className="nav-indicator">{i + 1}</span>
                    {seg.title}
                  </button>
                ))}
              </nav>

              {/* Cerrar menú */}
              <button
                onClick={() => setMenuOpen(false)}
                style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'rgba(255,255,255,0.45)', fontSize: '0.58rem', textAlign: 'left', padding: '0.25rem 0', marginTop: '0.3rem' }}
                aria-label={t.ariaCloseMenu}
              >
                {t.sidebarClose}
              </button>
            </div>
          </div>

          {/* ════ ÁREA PRINCIPAL ════════════════════════════ */}
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', minWidth: 0 }}>

            {/* ── Encabezado ─────────────────────────────── */}
            <header
              className="site-header"
              style={{ display: 'grid', gridTemplateColumns: '1fr auto 1fr', alignItems: 'center', gap: '1rem' }}
            >
              {/* Título — columna izquierda */}
              <h1
                className="brand-title"
                style={{ color: C.blue, textTransform: 'capitalize', fontSize: '1.15rem', fontWeight: 700, fontFamily: 'Arial,sans-serif', margin: 0 }}
              >
                {SEGMENTS[displayIdx].title}
              </h1>

              {/* Botón de idioma — columna central */}
              <button
                onClick={toggleLang}
                aria-label={lang === 'es' ? 'Switch to English' : 'Cambiar a español'}
                style={{
                  background: C.blue,
                  color: '#ffffff',
                  border: 'none',
                  borderRadius: 20,
                  padding: '4px 16px',
                  fontSize: '0.78rem',
                  fontWeight: 700,
                  letterSpacing: '0.08em',
                  cursor: 'pointer',
                  fontFamily: "'Open Sans', Arial, sans-serif",
                  transition: 'background 180ms ease',
                }}
                onMouseEnter={e => e.currentTarget.style.background = '#1e2c7a'}
                onMouseLeave={e => e.currentTarget.style.background = C.blue}
              >
                {t.langToggle}
              </button>

              {/* Contador — columna derecha */}
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, justifyContent: 'flex-end' }}>
                <span style={{ color: C.dark, fontSize: '0.82rem' }}>
                  {displayIdx + 1} / {SEGMENTS.length}
                </span>
                <div style={{ width: 10, height: 10, borderRadius: '50%', backgroundColor: C.red, flexShrink: 0 }} />
              </div>
            </header>

            {/* ── Área de diapositivas ────────────────────── */}
            <div style={{ flex: 1, position: 'relative', overflow: 'hidden' }}>
              <div
                key={`slide-${displayIdx}-${animClass}`}
                className={`slide-container ${animClass}`}
                style={{ position: 'absolute', inset: 0 }}
              >
                <CurrentSlide t={t} />
              </div>
            </div>

            {/* ── Footer de navegación ────────────────────── */}
            <footer className="slide-footer">
              <button
                onClick={() => goTo(displayIdx - 1)}
                disabled={displayIdx === 0 || animating}
                className="btn-nav btn-nav-primary"
                aria-label={t.ariaPrev}
              >
                {t.prev}
              </button>

              {/* Indicadores de posición */}
              <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                {SEGMENTS.map((_, i) => (
                  <button
                    key={i}
                    onClick={() => goTo(i)}
                    className={`slide-dot ${displayIdx === i ? 'active' : ''}`}
                    aria-label={`${t.ariaGoTo} ${i + 1}: ${SEGMENTS[i].title}`}
                    aria-current={displayIdx === i ? 'step' : undefined}
                  />
                ))}
              </div>

              <button
                onClick={() => goTo(displayIdx + 1)}
                disabled={displayIdx === SEGMENTS.length - 1 || animating}
                className="btn-nav btn-nav-primary"
                aria-label={t.ariaNext}
              >
                {t.next}
              </button>
            </footer>
          </div>
        </div>
        </div>
      );
    }

    /* ── Cargar traducciones y montar la app ────────────────── */
    fetch('locales.json?v=22')
      .then(r => r.json())
      .then(locales => {
        ReactDOM.createRoot(document.getElementById('root')).render(<App locales={locales} />);
      });
  </script>
</body>
</html>
